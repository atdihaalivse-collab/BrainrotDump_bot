        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;color:#fff;font-family:'Courier New',monospace;min-height:100vh;text-align:center;padding:8px;overflow-x:hidden}
        body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:999;animation:scan 0.1s infinite}

        .container{position:relative;z-index:1;max-width:430px;margin:0 auto}
        h1{background:linear-gradient(45deg,#ff00ff,#00ffff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:20px;margin:4px 0;animation:glitch 2s infinite}
        @keyframes glitch{0%,100%{transform:translate(0)}20%{transform:translate(-2px,2px)}40%{transform:translate(2px,-2px)}}

        .coin-val{font-size:17px;font-weight:bold;color:#ffd700}
        .coin-inc{font-size:9px;color:#ffaa00;display:block}
        .tabs{display:flex;gap:4px;justify-content:center;margin:8px 0;flex-wrap:wrap}
        .tab-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:7px 9px;border-radius:7px;cursor:pointer;font-size:11px;font-family:monospace;transition:all 0.3s;white-space:nowrap}
        .tab-btn.active{background:#ff00ff;border-color:#ff00ff;box-shadow:0 0 10px rgba(255,0,255,0.5)}
        .tab-content{display:none}
        .tab-content.active{display:block;animation:fadeIn 0.3s}
        @keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
        .stats{display:flex;justify-content:space-around;background:rgba(255,255,255,0.05);border-radius:10px;padding:8px;margin:6px 0;border:1px solid rgba(255,255,255,0.1);flex-wrap:wrap;gap:4px}

        .case-btn.disabled{pointer-events:none;opacity:0.5;animation:none;filter:grayscale(1)}
        .result{min-height:70px;padding:12px;background:rgba(0,0,0,0.3);border-radius:10px;margin:6px 0}
        .result-emoji{font-size:55px;display:block;animation:dropIn 0.5s}
        @keyframes dropIn{0%{transform:translateY(-40px) scale(0)}70%{transform:translateY(6px) scale(1.1)}100%{transform:translateY(0) scale(1)}}
        .flash-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1000;opacity:0}
        .shake{animation:shake 0.5s}
        @keyframes shake{0%,100%{transform:translate(0)}20%{transform:translate(-10px,3px)}40%{transform:translate(10px,-3px)}}

        /* ИНВЕНТАРЬ */

        .inv-item.rarity-common{border-color:#00ff00}
        .inv-item.rarity-rare{border-color:#0088ff}
        .inv-item.rarity-epic{border-color:#aa00ff}
        .inv-item.rarity-legendary{border-color:#ffaa00}
        .inv-item.rarity-mythic{border-color:#ff0000}

        .inv-item.lvl-20{box-shadow:0 0 28px rgba(255,255,255,0.9);animation:rainbowGlow 3s infinite;border-image:linear-gradient(45deg,red,orange,yellow,lime,cyan,blue,magenta,red) 1}
        @keyframes glowLvl{0%,100%{box-shadow:0 0 14px rgba(255,255,255,0.55)}50%{box-shadow:0 0 24px rgba(255,255,255,0.8)}}
        @keyframes rainbowGlow{0%{box-shadow:0 0 24px red}25%{box-shadow:0 0 24px yellow}50%{box-shadow:0 0 24px lime}75%{box-shadow:0 0 24px cyan}}

        /* АНИМАЦИИ */
        .rarity-chrome .inv-emoji{animation:chromeShake 2.5s infinite}
        @keyframes chromeShake{0%,100%{transform:translate(0,0)}25%{transform:translate(-2px,1px)}50%{transform:translate(2px,-1px)}}
        .rarity-common .inv-emoji{animation:commonBounce 3s infinite}
        @keyframes commonBounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}50%{transform:translateY(0)}}
        .rarity-rare .inv-emoji{animation:rareRun 2s infinite}
        @keyframes rareRun{0%{transform:translate(0,0) rotate(0)}25%{transform:translate(3px,-4px) rotate(-4deg)}50%{transform:translate(0,0)}75%{transform:translate(-3px,-4px) rotate(4deg)}}
        .rarity-epic .inv-emoji{animation:epicFloat 5s infinite}
        @keyframes epicFloat{0%,100%{transform:translateY(0) rotate(0)}25%{transform:translateY(-7px) rotate(-4deg)}50%{transform:translateY(0)}75%{transform:translateY(7px) rotate(4deg)}}
        .rarity-legendary .inv-emoji{animation:legendarySpin 6s infinite}
        @keyframes legendarySpin{0%{transform:translateY(0) rotate(0) scale(1)}25%{transform:translateY(-5px) rotate(8deg) scale(1.12)}50%{transform:translateY(0) scale(1)}75%{transform:translateY(5px) rotate(-8deg) scale(0.88)}}
        .rarity-mythic .inv-emoji{animation:mythicDance 1.5s infinite}
        @keyframes mythicDance{0%{transform:translate(0,0) rotate(0) scale(1)}20%{transform:translate(4px,-5px) rotate(12deg) scale(1.18)}40%{transform:translate(-4px,5px) rotate(-12deg) scale(0.82)}60%{transform:translate(3px,-3px) rotate(8deg) scale(1.1)}80%{transform:translate(-3px,3px) rotate(-8deg) scale(0.9)}}

        /* ПРОКАЧКА */
        .upgrade-box{background:rgba(255,215,0,0.05);border-radius:8px;padding:8px;margin:5px 0;border:2px solid #555;text-align:left;font-size:10px}
        .btn-upgrade{background:linear-gradient(45deg,#ffd700,#ffaa00);color:#000;border:none;padding:7px;border-radius:6px;font-size:11px;cursor:pointer;width:100%;font-family:monospace;font-weight:bold}

        .btn-craft{background:linear-gradient(45deg,#ffaa00,#ff6600);color:#000;border:none;padding:8px;border-radius:6px;font-size:12px;cursor:pointer;width:100%;font-family:monospace;font-weight:bold}
        .btn-craft:disabled{background:#444;color:#888}

        .btn{background:linear-gradient(45deg,#ff00ff,#cc00cc);color:#fff;border:none;padding:8px;border-radius:6px;font-size:12px;cursor:pointer;width:100%;font-family:monospace;font-weight:bold;margin-top:4px}
    </style>
</head>

                totalOpens=p.total_opens||0;pity=p.pity_counter||0;bestRarity=p.best_rarity||'none';coins=p.coins||100;
                updateUI();loadInv();loadTrades();loadAuction();
            }).catch(function(){updateUI();loadInv();loadTrades();loadAuction();});
            setInterval(addPassiveIncome,60000);
            setInterval(loadAuction,30000);
            var saved=localStorage.getItem('brainrot_history');
            if(saved) dropHistory=JSON.parse(saved);
        }

        function addPassiveIncome(){
            var inc=0;
            for(var i=0;i<allInv.length;i++) inc+=getItemIncome(allInv[i]);
            coins+=inc;
            supabase.from('players').upsert({tg_id:tgId,coins:coins}).then(function(){});
            updateUI();
        }

        function getItemIncome(item){return Math.floor((baseIncome[item.rarity]||1)*(1+(item.upgrade_level||0)*0.5));}
        function getLvlClass(lvl){
            if(lvl>=20) return 'lvl-20';if(lvl>=15) return 'lvl-15';if(lvl>=10) return 'lvl-10';if(lvl>=5) return 'lvl-5';if(lvl>=1) return 'lvl-1';return '';
        }

        function updateUI(){
            document.getElementById('opens').innerText=totalOpens;
            document.getElementById('pity').innerText=Math.max(0,10-pity);
            var bm={'none':'-','chrome':'🚽','common':'💚','rare':'💙','epic':'💜','legendary':'🧡','mythic':'❤️'};
            document.getElementById('best').innerText=bm[bestRarity]||'-';
            document.getElementById('coins').innerText=coins;
            var ti=0;for(var i=0;i<allInv.length;i++) ti+=getItemIncome(allInv[i]);
            document.getElementById('incomePerMin').innerText=ti;
            document.getElementById('caseButton').classList.toggle('disabled',coins<CASE_COST);
        }

        function openCase(){
            if(coins<CASE_COST){alert('Мало монет!');return;}
            coins-=CASE_COST;
            var item,roll=Math.random()*100,cum=0;
            if(pity>=10){var rp=items.filter(function(i){return['rare','epic','legendary','mythic'].includes(i.rarity)});item=rp[Math.floor(Math.random()*rp.length)];}
            else{for(var i=0;i<items.length;i++){cum+=items[i].chance;if(roll<=cum){item=items[i];break;}}if(!item) item=items[0];}
            totalOpens++;
            pity=['epic','legendary','mythic','rare'].includes(item.rarity)?0:pity+1;
            if(['chrome','common','rare','epic','legendary','mythic'].indexOf(item.rarity)>['chrome','common','rare','epic','legendary','mythic'].indexOf(bestRarity)) bestRarity=item.rarity;
            
            // Shiny шанс 2%
            var isShiny = Math.random() < 0.02;
            
            supabase.from('players').upsert({tg_id:tgId,total_opens:totalOpens,pity_counter:pity,best_rarity:bestRarity,coins:coins}).then(function(){});
            supabase.from('inventory').insert({player_tg_id:tgId,item_id:item.id,item_name:item.name+(isShiny?' ✨':''),rarity:item.rarity,emoji:item.emoji,upgrade_level:0,is_shiny:isShiny}).then(function(){});
            
            dropHistory.unshift({emoji:item.emoji+(isShiny?'✨':''),name:item.name+(isShiny?' SHINY':''),rarity:item.rarity,color:item.color,time:new Date().toLocaleTimeString()});
            if(dropHistory.length>50) dropHistory.pop();
            localStorage.setItem('brainrot_history',JSON.stringify(dropHistory));
            
            document.querySelector('.container').classList.add('shake');
            setTimeout(function(){document.querySelector('.container').classList.remove('shake')},500);
            
            document.getElementById('result').innerHTML='<span style="font-size:50px">'+item.emoji+(isShiny?'✨':'')+'</span><br><b style="color:'+item.color+'">'+item.rarity.toUpperCase()+(isShiny?' SHINY':'')+'</b><br>'+item.name;
            updateUI();loadInv();
        }

        function loadInv(){
            supabase.from('inventory').select('*').eq('player_tg_id',tgId).then(function(res){
                allInv = res.data || [];
                // Сортируем по редкости
                allInv.sort(function(a,b){return (rarityOrder[a.rarity]||99)-(rarityOrder[b.rarity]||99)});
                
                var html='',count=0,stacked={},unique=[];
                for(var i=0;i<allInv.length;i++){
                    var item=allInv[i];
                    if(item.upgrade_level===0 && !item.is_shiny){
                        if(!stacked[item.item_id]) stacked[item.item_id]={count:0,emoji:item.emoji,name:item.item_name,rarity:item.rarity};
                        stacked[item.item_id].count++;
                    } else unique.push(item);
                }
                var keys=Object.keys(stacked);
                for(var k=0;k<keys.length;k++){var s=stacked[keys[k]];count+=s.count;
                    html+='<div class="inv-item rarity-'+s.rarity+'" onclick="selectForCraft(\''+keys[k]+'\')"><span class="inv-emoji">'+s.emoji+'</span><span class="inv-name">'+s.name+'</span><span class="inv-lvl">x'+s.count+'</span>'+ (s.count>=10?'<div class="inv-badge">10+</div>':'') +'</div>';
                }
                for(var u=0;u<unique.length;u++){var i=unique[u];count++;
                    html+='<div class="inv-item rarity-'+i.rarity+' '+(i.is_shiny?'shiny':'')+' '+getLvlClass(i.upgrade_level||0)+'"><span class="inv-emoji">'+i.emoji+'</span><span class="inv-name">'+i.item_name+'</span><span class="inv-lvl">'+(i.is_shiny?'✨':'')+' Ур.'+(i.upgrade_level||0)+'</span></div>';
                }
                document.getElementById('inventory').innerHTML=html||'<p style="color:#888;padding:20px">Пусто</p>';
                document.getElementById('totalItems').innerText=count;
                updateUI();
            });
        }

        function loadUpgradeList(){
            supabase.from('inventory').select('*').eq('player_tg_id',tgId).then(function(res){
                var inv=res.data||[],html='';
                if(inv.length===0) html='<p style="color:#888">Нет карточек</p>';
                else inv.forEach(function(i){
                    var lvl=i.upgrade_level||0,m=lvl>=20,c=m?0:getUpgradeCost(lvl+1),inc=getItemIncome(i),ninc=m?inc:Math.floor((baseIncome[i.rarity]||1)*(1+(lvl+1)*0.5));
                    html+='<div class="upgrade-box" style="border-color:'+(i.rarity==='chrome'?'#888':i.rarity==='common'?'#0f0':i.rarity==='rare'?'#08f':i.rarity==='epic'?'#a0f':i.rarity==='legendary'?'#fa0':'#f00')+'"><b>'+i.emoji+' '+i.item_name+'</b> Ур.'+lvl+' | +'+inc+'/м';
                    if(!m) html+='<br>💰 Ур.'+(lvl+1)+': '+c+' монет → +'+ninc+'/м <button class="btn-upgrade" onclick="upgradeItem('+i.id+','+c+')" '+(coins<c?'disabled':'')+'>'+(coins<c?'Мало':'Прокачать')+'</button>';
                    else html+='<br>🌟 MAX!';
                    html+='</div>';
                });
                document.getElementById('upgradeList').innerHTML=html;
            });
        }

        function upgradeItem(id,cost){
            if(coins<cost) return;
            coins-=cost;
            supabase.from('inventory').select('*').eq('id',id).single().then(function(res){
                supabase.from('inventory').update({upgrade_level:(res.data.upgrade_level||0)+1}).eq('id',id).then(function(){
                    supabase.from('players').upsert({tg_id:tgId,coins:coins}).then(function(){});
                    updateUI();loadInv();loadUpgradeList();
                });
            });
        }

        function selectForCraft(itemId){
            var c=0;for(var i=0;i<allInv.length;i++){if(allInv[i].item_id===itemId && allInv[i].upgrade_level===0 && !allInv[i].is_shiny) c++;}
            if(c<10){alert('Нужно 10 одинаковых непрокачанных!');return;}
            craftSelected=itemId;document.getElementById('craftCount').innerText='10';
            var it=items.find(function(x){return x.id===itemId});
            document.getElementById('craftItemName').innerText=it?it.emoji+' '+it.name:'';
            document.getElementById('craftButton').disabled=false;
        }

        function doCraft(){
            if(!craftSelected) return;
            supabase.from('inventory').select('id').eq('player_tg_id',tgId).eq('item_id',craftSelected).eq('upgrade_level',0).eq('is_shiny',false).limit(10).then(function(res){
                var ids=(res.data||[]).map(function(r){return r.id});
                if(ids.length<10){alert('Недостаточно!');return;}
                Promise.all(ids.map(function(id){return supabase.from('inventory').delete().eq('id',id)})).then(function(){
                    var roll=Math.random()*100,ri;
                    if(roll<5) ri=items.filter(function(i){return i.rarity==='mythic'||i.rarity==='legendary'});
                    else if(roll<25) ri=items.filter(function(i){return i.rarity==='epic'});
                    else if(roll<55) ri=items.filter(function(i){return i.rarity==='rare'});
                    else ri=items.filter(function(i){return i.rarity==='common'||i.rarity==='chrome'});
                    ri=ri[Math.floor(Math.random()*ri.length)];
                    supabase.from('inventory').insert({player_tg_id:tgId,item_id:ri.id,item_name:ri.name,rarity:ri.rarity,emoji:ri.emoji,upgrade_level:0,is_shiny:false}).then(function(){});
                    document.getElementById('craftResult').innerHTML='<span style="font-size:40px">'+ri.emoji+'</span><br><b style="color:'+ri.color+'">'+ri.rarity.toUpperCase()+'</b><br>'+ri.name;
                    craftSelected=null;document.getElementById('craftCount').innerText='0';document.getElementById('craftItemName').innerText='';document.getElementById('craftButton').disabled=true;
                    loadInv();
                });
            });
        }

        // АУКЦИОН
        function updateAuctionSelect(){
            var sel=document.getElementById('auctionItemSelect');
            sel.innerHTML='<option value="">Выбери карточку</option>';
            allInv.forEach(function(i,idx){
                sel.innerHTML+='<option value="'+i.id+'">'+i.emoji+' '+i.item_name+' Ур.'+(i.upgrade_level||0)+(i.is_shiny?' ✨':'')+'</option>';
            });
        }

        function sellItem(){
            var id=document.getElementById('auctionItemSelect').value;
            var price=parseInt(document.getElementById('auctionPrice').value);
            if(!id||!price||price<1){alert('Выбери карточку и цену!');return;}
            supabase.from('auctions').insert({seller_tg_id:tgId,inventory_id:parseInt(id),price:price,status:'active'}).then(function(res){
                if(res.error) alert('Ошибка: '+res.error.message);
                else{alert('✅ Выставлено!');loadInv();loadAuction();}
            });
        }

        function loadAuction(){
            supabase.from('auctions').select('*').eq('status','active').neq('seller_tg_id',tgId).then(function(res){
                var aucs=res.data||[],html='';
                if(aucs.length===0) html='<p style="color:#666">Нет лотов</p>';
                else aucs.forEach(function(a){
                    supabase.from('inventory').select('*').eq('id',a.inventory_id).single().then(function(inv){
                        var i=inv.data;
                        if(i) html+='<div class="auction-item"><span style="font-size:22px">'+i.emoji+'</span><span>'+i.item_name+' Ур.'+(i.upgrade_level||0)+(i.is_shiny?'✨':'')+'<br>💰 <b>'+a.price+'</b> монет</span><button class="buy-btn" onclick="buyItem('+a.id+','+a.price+')">Купить</button></div>';
                        document.getElementById('auctionList').innerHTML=html||'<p style="color:#666">Нет лотов</p>';
                    });
                });
            });
        }

        function buyItem(aucId,price){
            if(coins<price){alert('Недостаточно монет!');return;}
            coins-=price;
            supabase.from('auctions').select('*').eq('id',aucId).single().then(function(res){
                var a=res.data;
                supabase.from('inventory').update({player_tg_id:tgId}).eq('id',a.inventory_id).then(function(){
                    supabase.from('auctions').update({status:'sold',buyer_tg_id:tgId}).eq('id',aucId).then(function(){
                        supabase.from('players').select('coins').eq('tg_id',a.seller_tg_id).single().then(function(sr){
                            supabase.from('players').update({coins:(sr.data.coins||0)+price}).eq('tg_id',a.seller_tg_id).then(function(){});
                        });
                        supabase.from('players').upsert({tg_id:tgId,coins:coins}).then(function(){});
                        alert('✅ Куплено!');updateUI();loadInv();loadAuction();
                    });
                });
            });
        }

        function renderHistory(){
            var saved=localStorage.getItem('brainrot_history');if(saved) dropHistory=JSON.parse(saved);
            var html='';
            if(dropHistory.length===0) html='<p style="color:#666">Пусто</p>';
            else dropHistory.forEach(function(h){html+='<div style="font-size:9px;padding:3px;border-bottom:1px solid #222"><span style="font-size:18px">'+h.emoji+'</span> '+h.name+' <span style="color:#888">'+h.time+'</span></div>'});
            document.getElementById('historyList').innerHTML=html;
        }

        function showMyInv(){
            document.getElementById('myInvForTrade').style.display='block';
            var html='';
            allInv.forEach(function(i){html+='<div class="inv-item rarity-'+i.rarity+'" onclick="selectTradeItem(\''+i.item_id+'\',\''+i.item_name+'\',\''+i.emoji+'\')" style="width:55px;padding:3px"><span class="inv-emoji" style="font-size:20px">'+i.emoji+'</span><span class="inv-name">'+i.item_name+'</span></div>'});
            document.getElementById('tradeInvGrid').innerHTML=html||'Пусто';
        }

        function selectTradeItem(id,name,emoji){
            tradeMyItem=id;
            document.getElementById('myTradeSlot').innerHTML=emoji+' '+name;
            document.getElementById('myTradeSlot').style.borderColor='#00ff88';
            document.getElementById('myInvForTrade').style.display='none';
        }

        function cancelTrade(){
            tradeMyItem=null;
            document.getElementById('myTradeSlot').innerHTML='Нажми выбрать';
            document.getElementById('myTradeSlot').style.borderColor='#444';
            document.getElementById('myInvForTrade').style.display='none';
        }

        function sendTrade(){
            var to=parseInt(document.getElementById('tradeTo').value);
            var their=document.getElementById('tradeTheir').value.trim();
            if(!to||!tradeMyItem||!their){alert('Заполни все поля!');return;}
            supabase.from('trades').insert({from_tg_id:tgId,to_tg_id:to,from_item_id:tradeMyItem,to_item_id:their,status:'pending'}).then(function(res){
                if(res.error) alert('Ошибка');
                else{alert('✅ Отправлено!');document.getElementById('tradeTo').value='';document.getElementById('tradeTheir').value='';cancelTrade();}
            });
        }

        function loadTrades(){
            supabase.from('trades').select('*').eq('to_tg_id',tgId).eq('status','pending').then(function(res){
                var trades=res.data,html='';
                if(!trades||trades.length===0) html='Нет трейдов';
                else trades.forEach(function(t){html+='<div style="background:#111;padding:6px;margin:3px 0;border-radius:5px;font-size:10px">От '+t.from_tg_id+' 📤'+t.from_item_id+'→📥'+t.to_item_id+' <button onclick="acceptTrade('+t.id+')" style="background:#0f0;color:#000;border:none;padding:3px 6px;border-radius:3px;font-size:9px">✓</button> <button onclick="rejectTrade('+t.id+')" style="background:#f44;color:#fff;border:none;padding:3px 6px;border-radius:3px;font-size:9px">✗</button></div>'});
                document.getElementById('tradesList').innerHTML=html;
            });
        }

        function acceptTrade(id){supabase.from('trades').update({status:'accepted'}).eq('id',id).then(function(){alert('Принято!');loadTrades()});}
        function rejectTrade(id){supabase.from('trades').update({status:'rejected'}).eq('id',id).then(function(){loadTrades()});}

        function switchTab(t){
            document.querySelectorAll('.tab-content').forEach(function(el){el.classList.remove('active')});
            document.querySelectorAll('.tab-btn').forEach(function(el){el.classList.remove('active')});
            document.getElementById('tab-'+t).classList.add('active');
            document.getElementById('tb-'+t).classList.add('active');
            if(t==='inv') loadInv();
            if(t==='upg') loadUpgradeList();
            if(t==='auc'){loadInv();updateAuctionSelect();loadAuction();}
            if(t==='hist') renderHistory();
            if(t==='trade') loadTrades();
            if(t==='craft') loadInv();
        }

        init();
    </script>
</body>
</html>
