<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Brainrot Collector</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;color:#fff;font-family:Arial,sans-serif;min-height:100vh;text-align:center;padding:15px}
        h1{background:linear-gradient(45deg,#ff00ff,#00ffff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:22px;margin:10px 0}
        .tabs{display:flex;gap:8px;justify-content:center;margin:15px 0;flex-wrap:wrap}
        .tab-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.3);color:#fff;padding:12px 18px;border-radius:10px;cursor:pointer;font-size:15px}
        .tab-btn.active{background:#ff00ff;border-color:#ff00ff}
        .tab-content{display:none}
        .tab-content.active{display:block}
        .stats{display:flex;justify-content:space-around;background:rgba(255,255,255,0.05);border-radius:15px;padding:15px;margin:10px 0}
        .stat-val{font-size:22px;font-weight:bold;color:#ff00ff}
        .stat-lbl{font-size:11px;color:#888}
        .case-btn{width:140px;height:140px;border-radius:50%;border:3px solid #ff00ff;background:radial-gradient(circle,#2a2a2a,#0a0a0a);color:#fff;font-size:60px;cursor:pointer;box-shadow:0 0 30px rgba(255,0,255,0.4);margin:20px auto;display:block;animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{box-shadow:0 0 30px rgba(255,0,255,0.4)}50%{box-shadow:0 0 60px rgba(255,0,255,0.7)}}
        .result{min-height:80px;padding:15px;background:rgba(0,0,0,0.3);border-radius:15px;margin:10px 0}
        .result-emoji{font-size:60px}
        .result-rarity{font-size:20px;font-weight:bold;text-transform:uppercase}
        .inv-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
        .inv-item{background:rgba(255,255,255,0.05);border-radius:12px;padding:8px;width:80px;border:1px solid #444;font-size:11px}
        .inv-emoji{font-size:30px}
        .trade-box{background:rgba(255,255,255,0.05);border-radius:15px;padding:15px;margin:10px 0}
        .trade-box input{width:100%;padding:12px;margin:5px 0;background:#111;border:1px solid #444;color:#fff;border-radius:10px;font-size:16px}
        .btn{background:#ff00ff;color:#fff;border:none;padding:14px;border-radius:10px;font-size:16px;cursor:pointer;width:100%;margin-top:10px}
        .trade-card{background:rgba(255,255,255,0.05);border-radius:10px;padding:12px;margin:8px 0;border:1px solid #444;font-size:13px;text-align:left}
        .trade-card button{padding:8px 14px;border:none;border-radius:5px;cursor:pointer;font-weight:bold;margin:3px;font-size:14px}
        .accept-btn{background:#00ff88;color:#000}
        .reject-btn{background:#ff4444;color:#fff}
    </style>
</head>
<body>
    <h1>🧠 Brainrot Collector</h1>
    <p id="username" style="color:#888">Загрузка...</p>
    <p style="color:#666;font-size:11px">TG ID: <span id="myId"></span></p>

    <div class="tabs">
        <button class="tab-btn active" id="tabBtn-case">🎁 Кейсы</button>
        <button class="tab-btn" id="tabBtn-inv">📦 Инвентарь</button>
        <button class="tab-btn" id="tabBtn-trade">🔄 Обмен</button>
    </div>

    <div class="tab-content active" id="tab-case">
        <div class="stats">
            <div><div class="stat-val" id="opens">0</div><div class="stat-lbl">Открытий</div></div>
            <div><div class="stat-val" id="pity">10</div><div class="stat-lbl">До гаранта</div></div>
            <div><div class="stat-val" id="best">-</div><div class="stat-lbl">Лучший</div></div>
        </div>
        <button class="case-btn" id="caseButton">🎁</button>
        <p style="color:#888;font-size:13px">Жми на кейс!</p>
        <div class="result" id="result">Тут появится дроп</div>
    </div>

    <div class="tab-content" id="tab-inv">
        <h3 style="color:#00ffff;margin:10px 0">📦 Инвентарь</h3>
        <div class="inv-grid" id="inventory"></div>
    </div>

    <div class="tab-content" id="tab-trade">
        <h3 style="color:#00ffff;margin:10px 0">🔄 Обмен</h3>
        <div class="trade-box">
            <p style="text-align:left;color:#888;font-size:12px">📤 Предложить обмен:</p>
            <input type="number" id="tradeTo" placeholder="Telegram ID игрока">
            <input type="text" id="tradeMy" placeholder="Твой предмет (ID)">
            <input type="text" id="tradeTheir" placeholder="Что хочешь взамен (ID)">
            <button class="btn" id="sendTradeBtn">🚀 Отправить</button>
        </div>
        <div id="tradesList">
            <p style="color:#888;font-size:13px">⏳ Входящие:</p>
            <p style="color:#666">Нет трейдов</p>
        </div>
    </div>

    <script>
        var SUPABASE_URL = 'https://qcpueprjlfuntfwqiboo.supabase.co';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFjcHVlcHJqbGZ1bnRmd3FpYm9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzNjgyNTksImV4cCI6MjA5OTk0NDI1OX0.UxJbESuV5jenQcVC9cUXX9qz9_NEVd9PrR_4Q-df618';
        var supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        var tg = Telegram.WebApp;
        tg.ready();
        tg.expand();

        var tgId = tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : 12345;
        var playerName = (tg.initDataUnsafe && tg.initDataUnsafe.user ? (tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name) : null) || 'Сигма';
        document.getElementById('username').innerText = '⚡ ' + playerName;
        document.getElementById('myId').innerText = tgId;

        var items = [
            {id:'skibidi',name:'Скибиди Туалет',rarity:'chrome',emoji:'🚽',chance:60,color:'#888'},
            {id:'gigachad',name:'Гигачад',rarity:'common',emoji:'💪',chance:25,color:'#0f0'},
            {id:'mamkin',name:'Мамкин Найн',rarity:'rare',emoji:'⚔️',chance:10,color:'#08f'},
            {id:'cybercat',name:'Кибер-Кот',rarity:'epic',emoji:'🐱',chance:3.9,color:'#a0f'},
            {id:'altushka',name:'Альтушка',rarity:'legendary',emoji:'👩‍💻',chance:1,color:'#fa0'},
            {id:'shaman',name:'Зумер-Шаман',rarity:'mythic',emoji:'👽',chance:0.1,color:'#f00'}
        ];

        var totalOpens = 0, pity = 0, bestRarity = 'none';

        // ВЕШАЕМ ОБРАБОТЧИКИ
        document.getElementById('caseButton').addEventListener('click', openCase);
        document.getElementById('tabBtn-case').addEventListener('click', function(){ switchTab('case'); });
        document.getElementById('tabBtn-inv').addEventListener('click', function(){ switchTab('inv'); });
        document.getElementById('tabBtn-trade').addEventListener('click', function(){ switchTab('trade'); });
        document.getElementById('sendTradeBtn').addEventListener('click', sendTrade);

        function init() {
            document.getElementById('username').innerText = '⚡ ' + playerName;
            supabase.from('players').select('*').eq('tg_id', tgId).single().then(function(res) {
                var p = res.data;
                if (!p) {
                    supabase.from('players').insert({ tg_id: tgId, username: playerName }).then(function() {});
                    p = { total_opens: 0, pity_counter: 0, best_rarity: 'none' };
                }
                totalOpens = p.total_opens || 0;
                pity = p.pity_counter || 0;
                bestRarity = p.best_rarity || 'none';
                updateUI();
                loadInv();
                loadTrades();
            }).catch(function() {
                updateUI();
                loadInv();
                loadTrades();
            });
        }

        function updateUI() {
            document.getElementById('opens').innerText = totalOpens;
            document.getElementById('pity').innerText = Math.max(0, 10 - pity);
            var bm = { 'none': '-', 'chrome': '🚽', 'common': '💚', 'rare': '💙', 'epic': '💜', 'legendary': '🧡', 'mythic': '❤️' };
            document.getElementById('best').innerText = bm[bestRarity] || '-';
        }

        function openCase() {
            var item;
            if (pity >= 10) {
                var rp = items.filter(function(i) { return ['rare','epic','legendary','mythic'].indexOf(i.rarity) >= 0; });
                item = rp[Math.floor(Math.random() * rp.length)];
            } else {
                var roll = Math.random() * 100, cum = 0;
                for (var i = 0; i < items.length; i++) {
                    cum += items[i].chance;
                    if (roll <= cum) { item = items[i]; break; }
                }
                if (!item) item = items[0];
            }

            totalOpens++;
            if (['epic','legendary','mythic','rare'].indexOf(item.rarity) >= 0) pity = 0; else pity++;
            var ranks = ['chrome','common','rare','epic','legendary','mythic'];
            if (ranks.indexOf(item.rarity) > ranks.indexOf(bestRarity)) bestRarity = item.rarity;

            supabase.from('players').upsert({ tg_id: tgId, username: playerName, total_opens: totalOpens, pity_counter: pity, best_rarity: bestRarity }).then(function() {});
            supabase.from('inventory').select('*').eq('player_tg_id', tgId).eq('item_id', item.id).single().then(function(res) {
                if (res.data) {
                    supabase.from('inventory').update({ count: res.data.count + 1 }).eq('id', res.data.id).then(function() {});
                } else {
                    supabase.from('inventory').insert({ player_tg_id: tgId, item_id: item.id, item_name: item.name, rarity: item.rarity, emoji: item.emoji, count: 1 }).then(function() {});
                }
            });

            document.getElementById('result').innerHTML = '<span class="result-emoji">' + item.emoji + '</span><br><span class="result-rarity" style="color:' + item.color + '">' + item.rarity + '</span><br>' + item.name;
            updateUI();
            loadInv();
        }

        function loadInv() {
            supabase.from('inventory').select('*').eq('player_tg_id', tgId).then(function(res) {
                var inv = res.data;
                var html = '';
                if (!inv || inv.length === 0) html = '<p style="color:#888">Пусто. Открой кейс!</p>';
                else {
                    inv.forEach(function(i) {
                        var bc = i.rarity==='chrome'?'#888':i.rarity==='common'?'#0f0':i.rarity==='rare'?'#08f':i.rarity==='epic'?'#a0f':i.rarity==='legendary'?'#fa0':'#f00';
                        html += '<div class="inv-item" style="border-color:' + bc + '"><div class="inv-emoji">' + i.emoji + '</div>' + i.item_name + '<br><small>x' + i.count + '</small><br><small style="color:#666">ID:' + i.item_id + '</small></div>';
                    });
                }
                document.getElementById('inventory').innerHTML = html;
            });
        }

        function sendTrade() {
            var to = parseInt(document.getElementById('tradeTo').value);
            var my = document.getElementById('tradeMy').value.trim();
            var their = document.getElementById('tradeTheir').value.trim();
            if (!to || !my || !their) { alert('Заполни все поля'); return; }
            supabase.from('trades').insert({ from_tg_id: tgId, to_tg_id: to, from_item_id: my, to_item_id: their, status: 'pending' }).then(function(res) {
                if (res.error) alert('Ошибка: ' + res.error.message);
                else {
                    alert('Предложение отправлено!');
                    document.getElementById('tradeTo').value = '';
                    document.getElementById('tradeMy').value = '';
                    document.getElementById('tradeTheir').value = '';
                }
            });
        }

        function loadTrades() {
            supabase.from('trades').select('*').eq('to_tg_id', tgId).eq('status', 'pending').then(function(res) {
                var trades = res.data;
                var html = '<p style="color:#888;font-size:13px">⏳ Входящие:</p>';
                if (!trades || trades.length === 0) html += '<p style="color:#666">Нет трейдов</p>';
                else {
                    trades.forEach(function(t) {
                        html += '<div class="trade-card">От <b>' + t.from_tg_id + '</b><br>📤 ' + t.from_item_id + '<br>📥 ' + t.to_item_id + '<br><button class="accept-btn" data-id="' + t.id + '">Принять</button><button class="reject-btn" data-id="' + t.id + '">Отклонить</button></div>';
                    });
                }
                document.getElementById('tradesList').innerHTML = html;
                
                // Вешаем обработчики на кнопки
                var acceptBtns = document.querySelectorAll('.accept-btn');
                for (var i = 0; i < acceptBtns.length; i++) {
                    acceptBtns[i].addEventListener('click', function() {
                        var id = parseInt(this.getAttribute('data-id'));
                        supabase.from('trades').update({ status: 'accepted' }).eq('id', id).then(function() {
                            alert('Обмен принят!');
                            loadTrades();
                        });
                    });
                }
                var rejectBtns = document.querySelectorAll('.reject-btn');
                for (var j = 0; j < rejectBtns.length; j++) {
                    rejectBtns[j].addEventListener('click', function() {
                        var id = parseInt(this.getAttribute('data-id'));
                        supabase.from('trades').update({ status: 'rejected' }).eq('id', id).then(function() {
                            loadTrades();
                        });
                    });
                }
            });
        }

        function switchTab(t) {
            var tabs = document.querySelectorAll('.tab-content');
            for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
            var btns = document.querySelectorAll('.tab-btn');
            for (var j = 0; j < btns.length; j++) btns[j].classList.remove('active');
            document.getElementById('tab-' + t).classList.add('active');
            document.getElementById('tabBtn-' + t).classList.add('active');
            if (t === 'inv') loadInv();
            if (t === 'trade') loadTrades();
        }

        init();
    </script>
</body>
</html>
