<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;color:#fff;font-family:'Courier New',monospace;min-height:100vh;text-align:center;padding:8px;overflow-x:hidden}
        .container{position:relative;z-index:1;max-width:430px;margin:0 auto}
        h1{background:linear-gradient(45deg,#ff00ff,#00ffff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:22px;margin:6px 0;animation:glitch 2s infinite}
        @keyframes glitch{0%,100%{transform:translate(0)}20%{transform:translate(-2px,2px)}40%{transform:translate(2px,-2px)}}
        .coin-display{background:linear-gradient(45deg,rgba(255,100,150,0.2),rgba(200,50,100,0.1));border:1px solid rgba(255,100,150,0.3);border-radius:20px;padding:8px 16px;margin:6px auto;max-width:300px}
        .coin-val{font-size:18px;font-weight:bold;color:#ff88aa}
        .tabs{display:flex;gap:4px;justify-content:center;margin:10px 0;flex-wrap:wrap}
        .tab-btn{background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.25);color:#fff;padding:8px 10px;border-radius:10px;cursor:pointer;font-size:14px;font-family:monospace;min-width:40px;min-height:40px;display:flex;align-items:center;justify-content:center}
        .tab-btn.active{background:#ff00ff;border-color:#ff00ff;box-shadow:0 0 12px rgba(255,0,255,0.5)}
        .tab-content{display:none}
        .tab-content.active{display:block;animation:fadeIn 0.2s}
        @keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
        .stats{display:flex;justify-content:space-around;background:rgba(255,255,255,0.05);border-radius:10px;padding:8px;margin:6px 0;font-size:12px}
        .case-btn{width:120px;height:120px;border-radius:50%;border:4px solid #ff00ff;background:radial-gradient(circle,#1a1a1a,#0a0a0a);color:#fff;font-size:50px;cursor:pointer;box-shadow:0 0 25px rgba(255,0,255,0.4);margin:10px auto;display:flex;align-items:center;justify-content:center;animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(255,0,255,0.4)}50%{box-shadow:0 0 40px rgba(255,0,255,0.7)}}
        .case-btn.disabled{pointer-events:none;opacity:0.4;animation:none;filter:grayscale(1)}
        .result{min-height:60px;padding:10px;background:rgba(0,0,0,0.3);border-radius:10px;margin:6px 0;font-size:13px}
        .shake{animation:shake 0.6s}
        @keyframes shake{0%,100%{transform:translate(0)}20%{transform:translate(-10px,4px)}40%{transform:translate(10px,-4px)}}

        .inv-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
        .inv-item{background:rgba(255,255,255,0.04);border-radius:10px;padding:6px;width:72px;border:3px solid #888;font-size:7px;cursor:pointer;position:relative;transition:all 0.3s}
        .inv-item:active{transform:scale(0.9)}
        .inv-item.rarity-chrome{border-color:#888}
        .inv-item.rarity-common{border-color:#00ff00}
        .inv-item.rarity-rare{border-color:#0088ff}
        .inv-item.rarity-epic{border-color:#aa00ff}
        .inv-item.rarity-legendary{border-color:#ffaa00}
        .inv-item.rarity-mythic{border-color:#ff0000}
        .inv-item.shiny{background:rgba(255,215,0,0.15)!important;border-style:dashed!important}
        .inv-item.evo-mega{border-width:4px;box-shadow:0 0 8px rgba(255,255,255,0.4)}
        .inv-item.evo-giga{border-width:4px;box-shadow:0 0 14px rgba(255,255,255,0.6);animation:glowEvo 2s infinite}
        .inv-item.evo-ultra{border-width:4px;box-shadow:0 0 20px rgba(255,255,255,0.8);animation:glowEvo 1.5s infinite}
        .inv-item.evo-god{border-width:4px;box-shadow:0 0 28px rgba(255,215,0,1);animation:rainbowGlow 2s infinite}
        @keyframes glowEvo{0%,100%{box-shadow:0 0 14px rgba(255,255,255,0.6)}50%{box-shadow:0 0 24px rgba(255,255,255,0.9)}}
        @keyframes rainbowGlow{0%{box-shadow:0 0 24px red}33%{box-shadow:0 0 24px yellow}66%{box-shadow:0 0 24px lime}}
        .inv-emoji{font-size:28px;display:block}
        .inv-name{font-size:7px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .inv-count-badge{position:absolute;top:-8px;right:-8px;background:linear-gradient(135deg,#ff6600,#ff3300);color:#fff;border-radius:50%;width:24px;height:24px;font-size:11px;line-height:24px;font-weight:bold;z-index:2;box-shadow:0 2px 6px rgba(0,0,0,0.7);border:2px solid #fff}
        .inv-evo-btn{position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);background:#ffaa00;color:#000;border:none;border-radius:8px;padding:2px 6px;font-size:7px;cursor:pointer;font-weight:bold;z-index:3}

        .rarity-chrome .inv-emoji{animation:chromeShake 2.5s infinite}
        @keyframes chromeShake{0%,100%{transform:translate(0,0)}25%{transform:translate(-2px,1px)}50%{transform:translate(2px,-1px)}}
        .rarity-common .inv-emoji{animation:commonBounce 3s infinite}
        @keyframes commonBounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}50%{transform:translateY(0)}}
        .rarity-rare .inv-emoji{animation:rareRun 2s infinite}
        @keyframes rareRun{0%{transform:translate(0,0) rotate(0)}25%{transform:translate(3px,-5px) rotate(-5deg)}50%{transform:translate(0,0)}}
        .rarity-epic .inv-emoji{animation:epicFloat 5s infinite}
        @keyframes epicFloat{0%,100%{transform:translateY(0) rotate(0)}25%{transform:translateY(-8px) rotate(-5deg)}50%{transform:translateY(0)}}
        .rarity-legendary .inv-emoji{animation:legendarySpin 6s infinite}
        @keyframes legendarySpin{0%{transform:translateY(0) rotate(0) scale(1)}25%{transform:translateY(-6px) rotate(10deg) scale(1.15)}}
        .rarity-mythic .inv-emoji{animation:mythicDance 1.5s infinite}
        @keyframes mythicDance{0%{transform:translate(0,0) rotate(0) scale(1)}20%{transform:translate(5px,-6px) rotate(15deg) scale(1.2)}40%{transform:translate(-5px,6px) rotate(-15deg) scale(0.8)}}

        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:2000;display:flex;align-items:center;justify-content:center}
        .modal-card{background:#111;border-radius:20px;padding:18px;width:90%;max-width:340px;text-align:center;position:relative;animation:modalPop 0.3s}
        @keyframes modalPop{0%{transform:scale(0.6) rotate(10deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
        .modal-close{position:absolute;top:8px;right:12px;color:#fff;font-size:28px;cursor:pointer;background:none;border:none}
        .modal-emoji{font-size:80px;display:block;animation:modalFloat 2.5s infinite}
        @keyframes modalFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
        .modal-upgrade-btn{display:block;width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;font-size:14px;font-weight:bold;cursor:pointer;font-family:monospace;background:linear-gradient(45deg,#ffd700,#ffaa00);color:#000}
        .modal-upgrade-btn:disabled{background:#444;color:#888;cursor:not-allowed}
        .modal-upgrade-max{color:#ffd700;font-size:14px;font-weight:bold;margin-top:8px}

        .btn{background:linear-gradient(45deg,#ff00ff,#cc00cc);color:#fff;border:none;padding:12px;border-radius:8px;font-size:14px;cursor:pointer;width:100%;font-family:monospace;font-weight:bold;margin-top:4px}
        .btn:disabled{background:#444;color:#888}
    </style>
</head>
<body>

        <div class="tab-content" id="tab-craft"><div style="background:rgba(255,170,0,0.06);border-radius:14px;padding:12px;margin:6px 0;border:2px solid rgba(255,170,0,0.4)"><h3 style="color:#ffaa00">🔨 Комбо-крафт (10 любых)</h3><div id="craftSlotsContainer" style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;min-height:50px;margin:8px 0;padding:8px;background:rgba(0,0,0,0.3);border-radius:10px;border:2px dashed #555"></div><p style="color:#ffaa00">Выбрано: <b id="craftCount">0</b>/10</p><div id="craftPreview" style="background:rgba(0,0,0,0.3);border-radius:8px;padding:8px;margin:6px 0;min-height:50px;font-size:10px;color:#666">Добавь карты</div><button class="btn" style="background:#ffaa00;color:#000" id="craftButton" disabled>🔨 Скрафтить!</button></div></div>
        <div class="tab-content" id="tab-auc"><h3 style="color:#00ff88;margin:6px 0">🏪 Аукцион</h3><select id="auctionItemSelect" style="width:100%;padding:8px;margin:4px 0;background:#111;border:1px solid #444;color:#fff;border-radius:6px;font-size:12px"><option value="">Выбери</option></select><input type="number" id="auctionPrice" placeholder="Цена" style="width:100%;padding:8px;margin:4px 0;background:#111;border:1px solid #444;color:#fff;border-radius:6px;font-size:12px"><button id="sellBtn" style="background:#00ff88;color:#000;border:none;padding:10px;border-radius:6px;font-size:13px;cursor:pointer;width:100%;font-weight:bold;margin-top:4px">📤 Выставить</button><div id="auctionList" style="margin-top:6px;font-size:10px;color:#888"></div></div>
        <div class="tab-content" id="tab-rate"><h3 style="color:#ff88aa;margin:6px 0">🏆 Топ</h3><div id="ratingList">Загрузка...</div></div>
        <div class="tab-content" id="tab-trade"><div style="background:rgba(255,255,255,0.05);border-radius:10px;padding:10px;margin:6px 0"><input type="number" id="tradeTo" placeholder="TG ID" style="width:100%;padding:8px;margin:4px 0;background:#111;border:1px solid #444;color:#fff;border-radius:6px;font-size:12px"><div id="myTradeSlot" style="border:2px dashed #555;border-radius:6px;padding:10px;margin:4px 0;cursor:pointer;font-size:11px;color:#888;text-align:center">👆 Выбери</div><input type="text" id="tradeTheir" placeholder="ID предмета" style="width:100%;padding:8px;margin:4px 0;background:#111;border:1px solid #444;color:#fff;border-radius:6px;font-size:12px"><div id="myInvForTrade" style="display:none"><div id="tradeInvGrid" style="display:flex;flex-wrap:wrap;gap:4px;max-height:120px;overflow-y:auto;padding:6px;background:rgba(0,0,0,0.2);border-radius:6px;margin:4px 0"></div><button onclick="cancelTrade()" style="background:#444;color:#fff;border:none;padding:4px 8px;border-radius:4px;font-size:10px">Отмена</button></div><button class="btn" id="sendTradeBtn">🚀 Отправить</button></div></div>
    </div>

    <script>
        var SUPABASE_URL = 'https://qcpueprjlfuntfwqiboo.supabase.co';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFjcHVlcHJqbGZ1bnRmd3FpYm9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzNjgyNTksImV4cCI6MjA5OTk0NDI1OX0.UxJbESuV5jenQcVC9cUXX9qz9_NEVd9PrR_4Q-df618';
        var supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        var tg = Telegram.WebApp; tg.ready(); tg.expand();
        var tgId = tg.initDataUnsafe?.user?.id || 12345;
        var pn = tg.initDataUnsafe?.user?.username || tg.initDataUnsafe?.user?.first_name || 'Сигма';
        document.getElementById('username').innerText = '⚡ ' + pn;

        var CASE_COST = 10;
        var baseIncome = {'chrome':1,'common':3,'rare':7,'epic':15,'legendary':40,'mythic':100};
        var rarityColors = {'chrome':'#888','common':'#00ff00','rare':'#0088ff','epic':'#aa00ff','legendary':'#ffaa00','mythic':'#ff0000'};
        var evoStages = ['','Мега','Гига','Ультра','Бог'];
        var evoMultiplier = [1,1.5,2.5,5,10];

        function getUpgradeCost(lvl){if(lvl<=0)return 0;if(lvl<=5)return Math.floor(50*Math.pow(1.5,lvl-1));if(lvl<=10)return Math.floor(200*Math.pow(1.6,lvl-6));if(lvl<=15)return Math.floor(1000*Math.pow(1.7,lvl-11));return Math.floor(5000*Math.pow(1.8,lvl-16));}
        function getEvoClass(evo){if(evo>=4)return'evo-god';if(evo>=3)return'evo-ultra';if(evo>=2)return'evo-giga';if(evo>=1)return'evo-mega';return'';}

        var items = [
            {id:'skibidi',name:'Скибиди',rarity:'chrome',emoji:'🚽',chance:8},{id:'sigma',name:'Сигма',rarity:'chrome',emoji:'🗿',chance:8},{id:'rizz',name:'Ризз',rarity:'chrome',emoji:'😏',chance:7},{id:'ohio',name:'Огайо',rarity:'chrome',emoji:'🌽',chance:7},{id:'fanum',name:'Фанум',rarity:'chrome',emoji:'🍔',chance:6},{id:'kaira',name:'Кай',rarity:'chrome',emoji:'🤷',chance:6},{id:'edge',name:'Эдж',rarity:'chrome',emoji:'😈',chance:6},{id:'meow',name:'Мяу',rarity:'chrome',emoji:'😺',chance:6},{id:'yapp',name:'Яппинг',rarity:'chrome',emoji:'🗣️',chance:6},{id:'gigachad',name:'Гигачад',rarity:'common',emoji:'💪',chance:4},{id:'oguzok',name:'Огузок',rarity:'common',emoji:'🍑',chance:4},{id:'bombastic',name:'Бомбастик',rarity:'common',emoji:'👀',chance:3},{id:'goofy',name:'Гуфи',rarity:'common',emoji:'🤪',chance:3},{id:'glazer',name:'Глейзер',rarity:'common',emoji:'😍',chance:3},{id:'blud',name:'Блуд',rarity:'common',emoji:'💀',chance:3},{id:'nocap',name:'Ноу-кэп',rarity:'common',emoji:'🧢',chance:3},{id:'womp',name:'Вомп',rarity:'common',emoji:'🎺',chance:2},{id:'mamkin',name:'Мамкин',rarity:'rare',emoji:'⚔️',chance:1.5},{id:'quad',name:'Квадро',rarity:'rare',emoji:'🦘',chance:1.5},{id:'zawarudo',name:'За Вардо',rarity:'rare',emoji:'⏱️',chance:1.5},{id:'ded',name:'Дед',rarity:'rare',emoji:'🖤',chance:1.5},{id:'kringe',name:'Кринж',rarity:'rare',emoji:'🫣',chance:1.5},{id:'pov',name:'ПОВ',rarity:'rare',emoji:'📹',chance:1.5},{id:'based',name:'Бейзд',rarity:'rare',emoji:'🗿',chance:1},{id:'cybercat',name:'Кибер-Кот',rarity:'epic',emoji:'🐱',chance:0.7},{id:'npc',name:'NPC',rarity:'epic',emoji:'🤖',chance:0.7},{id:'grimace',name:'Гримейс',rarity:'epic',emoji:'🥤',chance:0.6},{id:'mewing',name:'Мьюинг',rarity:'epic',emoji:'🗿',chance:0.6},{id:'looksmax',name:'Луксмакс',rarity:'epic',emoji:'💅',chance:0.6},{id:'doom',name:'Думскролл',rarity:'epic',emoji:'📱',chance:0.4},{id:'tiktok',name:'ТикТок',rarity:'epic',emoji:'🎬',chance:0.3},{id:'minecraft',name:'Майнкрафт',rarity:'legendary',emoji:'⛏️',chance:0.2},{id:'altushka',name:'Альтушка',rarity:'legendary',emoji:'👩‍💻',chance:0.2},{id:'drip',name:'Дрип',rarity:'legendary',emoji:'🥶',chance:0.2},{id:'sigmam',name:'Сигма-мейл',rarity:'legendary',emoji:'🐺',chance:0.15},{id:'lobster',name:'Лобстер',rarity:'legendary',emoji:'🦞',chance:0.15},{id:'alpha',name:'Альфа',rarity:'legendary',emoji:'👑',chance:0.1},{id:'shaman',name:'Шаман',rarity:'mythic',emoji:'👽',chance:0.03},{id:'hyper',name:'Гипер',rarity:'mythic',emoji:'❄️',chance:0.03},{id:'brotgod',name:'Бог',rarity:'mythic',emoji:'🧠',chance:0.02},{id:'cringe',name:'Властелин',rarity:'mythic',emoji:'😬',chance:0.02}
        ];

        var totalOpens=0,pity=0,bestRarity='none',coins=100,allInv=[],tradeMyItem=null,craftSlots=[];

        document.getElementById('caseButton').addEventListener('click',openCase);
        ['case','inv','evo','craft','auc','rate','trade'].forEach(function(t){document.getElementById('tb-'+t).addEventListener('click',function(){switchTab(t)});});
        document.getElementById('craftButton').addEventListener('click',doCraft);
        document.getElementById('sellBtn').addEventListener('click',sellItem);
        document.getElementById('sendTradeBtn').addEventListener('click',sendTrade);
        document.getElementById('myTradeSlot').addEventListener('click',showMyInv);

        function init(){
            supabase.from('players').select('*').eq('tg_id',tgId).single().then(function(res){
                var p=res.data,now=new Date();
                if(!p){supabase.from('players').insert({tg_id:tgId,username:pn,coins:100,last_seen:now.toISOString()}).then(function(){});p={total_opens:0,pity_counter:0,best_rarity:'none',coins:100};}
                totalOpens=p.total_opens||0;pity=p.pity_counter||0;bestRarity=p.best_rarity||'none';coins=p.coins||100;
                var mins=Math.floor((now-new Date(p.last_seen||now))/60000);
                supabase.from('inventory').select('*').eq('player_tg_id',tgId).then(function(invRes){
                    allInv=invRes.data||[];var ipm=0;for(var i=0;i<allInv.length;i++) ipm+=getItemIncome(allInv[i]);
                    if(mins>0&&ipm>0){coins+=mins*ipm;document.getElementById('offlineEarn').innerText='💤 +'+mins*ipm+' брейнкоинов';setTimeout(function(){document.getElementById('offlineEarn').innerText=''},10000);}
                    supabase.from('players').upsert({tg_id:tgId,coins:coins,last_seen:now.toISOString()}).then(function(){});
                    updateUI();renderInventory();loadAuction();
                });
            }).catch(function(){updateUI();});
            setInterval(function(){var ipm=0;for(var i=0;i<allInv.length;i++) ipm+=getItemIncome(allInv[i]);if(ipm>0){coins+=ipm;supabase.from('players').upsert({tg_id:tgId,coins:coins,last_seen:new Date().toISOString()}).then(function(){});updateUI();}},60000);
        }

        function getItemIncome(item){return Math.floor((baseIncome[item.rarity]||1)*evoMultiplier[item.evolution||0]*(1+(item.upgrade_level||0)*0.5));}

        function updateUI(){
            document.getElementById('opens').innerText=totalOpens;
            document.getElementById('pity').innerText=Math.max(0,10-pity);
            var bm={'none':'-','chrome':'🚽','common':'💚','rare':'💙','epic':'💜','legendary':'🧡','mythic':'❤️'};
            document.getElementById('best').innerText=bm[bestRarity]||'-';
            document.getElementById('coins').innerText=coins;
            var ti=0;for(var i=0;i<allInv.length;i++) ti+=getItemIncome(allInv[i]);
            document.getElementById('incomePerMin').innerText=ti;
            document.getElementById('caseButton').classList.toggle('disabled',coins<CASE_COST);
        }

        function renderInventory(){
            allInv.sort(function(a,b){var o={'mythic':0,'legendary':1,'epic':2,'rare':3,'common':4,'chrome':5};return (o[a.rarity]||99)-(o[b.rarity]||99)});
            var html='',count=0,stacked={},unique=[];
            for(var i=0;i<allInv.length;i++){
                var item=allInv[i];
                // Стакаем только базовые: lvl=0, evo=0, не shiny
                if(item.evolution===0&&item.upgrade_level===0&&!item.is_shiny){
                    if(!stacked[item.item_id])stacked[item.item_id]={count:0,emoji:item.emoji,name:item.item_name,rarity:item.rarity};
                    stacked[item.item_id].count++;
                }else unique.push(item);
            }
            var keys=Obj
