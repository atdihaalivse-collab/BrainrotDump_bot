<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Brainrot Collector</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;color:#fff;font-family:'Courier New',monospace;min-height:100vh;text-align:center;padding:8px;overflow-x:hidden}
        .container{position:relative;z-index:1;max-width:430px;margin:0 auto}
        h1{background:linear-gradient(45deg,#ff00ff,#00ffff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:22px;margin:6px 0;animation:glitch 2s infinite}
        @keyframes glitch{0%,100%{transform:translate(0)}20%{transform:translate(-2px,2px)}40%{transform:translate(2px,-2px)}}
        .coin-display{background:linear-gradient(45deg,rgba(255,100,150,0.2),rgba(200,50,100,0.1));border:1px solid rgba(255,100,150,0.3);border-radius:20px;padding:8px 16px;margin:6px auto;max-width:300px}
        .coin-val{font-size:18px;font-weight:bold;color:#ff88aa}
        .tabs{display:flex;gap:4px;justify-content:center;margin:10px 0;flex-wrap:wrap}
        .tab-btn{background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.25);color:#fff;padding:8px 10px;border-radius:10px;cursor:pointer;font-size:14px;font-family:monospace;min-width:40px;min-height:40px;display:flex;align-items:center;justify-content:center}
        .tab-btn.active{background:#ff00ff;border-color:#ff00ff;box-shadow:0 0 12px rgba(255,0,255,0.5)}
        .tab-content{display:none}
        .tab-content.active{display:block;animation:fadeIn 0.2s}
        @keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
        .stats{display:flex;justify-content:space-around;background:rgba(255,255,255,0.05);border-radius:10px;padding:8px;margin:6px 0;font-size:12px}
        .case-btn{width:120px;height:120px;border-radius:50%;border:4px solid #ff00ff;background:radial-gradient(circle,#1a1a1a,#0a0a0a);color:#fff;font-size:50px;cursor:pointer;box-shadow:0 0 25px rgba(255,0,255,0.4);margin:10px auto;display:flex;align-items:center;justify-content:center;animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(255,0,255,0.4)}50%{box-shadow:0 0 40px rgba(255,0,255,0.7)}}
        .case-btn.disabled{pointer-events:none;opacity:0.4;animation:none;filter:grayscale(1)}
        .result{min-height:60px;padding:10px;background:rgba(0,0,0,0.3);border-radius:10px;margin:6px 0;font-size:13px}
        .shake{animation:shake 0.6s}
        @keyframes shake{0%,100%{transform:translate(0)}20%{transform:translate(-10px,4px)}40%{transform:translate(10px,-4px)}}

        .inv-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
        .inv-item{background:rgba(255,255,255,0.04);border-radius:10px;padding:6px;width:72px;border:3px solid #888;font-size:7px;cursor:pointer;position:relative;transition:all 0.3s}
        .inv-item:active{transform:scale(0.9)}
        .inv-item.rarity-chrome{border-color:#888}
        .inv-item.rarity-common{border-color:#00ff00}
        .inv-item.rarity-rare{border-color:#0088ff}
        .inv-item.rarity-epic{border-color:#aa00ff}
        .inv-item.rarity-legendary{border-color:#ffaa00}
        .inv-item.rarity-mythic{border-color:#ff0000}
        .inv-item.shiny{background:rgba(255,215,0,0.15)!important;border-style:dashed!important}
        .inv-item.evo-mega{border-width:4px;box-shadow:0 0 8px rgba(255,255,255,0.4)}
        .inv-item.evo-giga{border-width:4px;box-shadow:0 0 14px rgba(255,255,255,0.6);animation:glowEvo 2s infinite}
        .inv-item.evo-ultra{border-width:4px;box-shadow:0 0 20px rgba(255,255,255,0.8);animation:glowEvo 1.5s infinite}
        .inv-item.evo-god{border-width:4px;box-shadow:0 0 28px rgba(255,215,0,1);animation:rainbowGlow 2s infinite}
        @keyframes glowEvo{0%,100%{box-shadow:0 0 14px rgba(255,255,255,0.6)}50%{box-shadow:0 0 24px rgba(255,255,255,0.9)}}
        @keyframes rainbowGlow{0%{box-shadow:0 0 24px red}33%{box-shadow:0 0 24px yellow}66%{box-shadow:0 0 24px lime}}
        .inv-emoji{font-size:28px;display:block}
        .inv-name{font-size:7px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .inv-count-badge{position:absolute;top:-8px;right:-8px;background:linear-gradient(135deg,#ff6600,#ff3300);color:#fff;border-radius:50%;width:24px;height:24px;font-size:11px;line-height:24px;font-weight:bold;z-index:2;box-shadow:0 2px 6px rgba(0,0,0,0.7);border:2px solid #fff}
        .inv-evo-btn{position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);background:#ffaa00;color:#000;border:none;border-radius:8px;padding:2px 6px;font-size:7px;cursor:pointer;font-weight:bold;z-index:3}

        .rarity-chrome .inv-emoji{animation:chromeShake 2.5s infinite}
        @keyframes chromeShake{0%,100%{transform:translate(0,0)}25%{transform:translate(-2px,1px)}50%{transform:translate(2px,-1px)}}
        .rarity-common .inv-emoji{animation:commonBounce 3s infinite}
        @keyframes commonBounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}50%{transform:translateY(0)}}
        .rarity-rare .inv-emoji{animation:rareRun 2s infinite}
        @keyframes rareRun{0%{transform:translate(0,0) rotate(0)}25%{transform:translate(3px,-5px) rotate(-5deg)}50%{transform:translate(0,0)}}
        .rarity-epic .inv-emoji{animation:epicFloat 5s infinite}
        @keyframes epicFloat{0%,100%{transform:translateY(0) rotate(0)}25%{transform:translateY(-8px) rotate(-5deg)}50%{transform:translateY(0)}}
        .rarity-legendary .inv-emoji{animation:legendarySpin 6s infinite}
        @keyframes legendarySpin{0%{transform:translateY(0) rotate(0) scale(1)}25%{transform:translateY(-6px) rotate(10deg) scale(1.15)}}
        .rarity-mythic .inv-emoji{animation:mythicDance 1.5s infinite}
        @keyframes mythicDance{0%{transform:translate(0,0) rotate(0) scale(1)}20%{transform:translate(5px,-6px) rotate(15deg) scale(1.2)}40%{transform:translate(-5px,6px) rotate(-15deg) scale(0.8)}}

        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:2000;display:flex;align-items:center;justify-content:center}
        .modal-card{background:#111;border-radius:20px;padding:18px;width:90%;max-width:340px;text-align:center;position:relative;animation:modalPop 0.3s}
        @keyframes modalPop{0%{transform:scale(0.6) rotate(10deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
        .modal-close{position:absolute;top:8px;right:12px;color:#fff;font-size:28px;cursor:pointer;background:none;border:none}
        .modal-emoji{font-size:80px;display:block;animation:modalFloat 2.5s infinite}
        @keyframes modalFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
        .modal-upgrade-btn{display:block;width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;font-size:14px;font-weight:bold;cursor:pointer;font-family:monospace;background:linear-gradient(45deg,#ffd700,#ffaa00);color:#000}
        .modal-upgrade-btn:disabled{background:#444;color:#888;cursor:not-allowed}
        .modal-upgrade-max{color:#ffd700;font-size:14px;font-weight:bold;margin-top:8px}

        .btn{background:linear-gradient(45deg,#ff00ff,#cc00cc);color:#fff;border:none;padding:12px;border-radius:8px;font-size:14px;cursor:pointer;width:100%;font-family:monospace;font-weight:bold;margin-top:4px}
        .btn:disabled{background:#444;color:#888}
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <h1>🧠 Brainrot Collector</h1>
        <p id="username" style="color:#888;font-size:10px">...</p>
        <div class="coin-display">🧠 <span class="coin-val" id="coins">100</span> брейнкоинов <span style="font-size:9px;color:#ff6688">+<span id="incomePerMin">0</span>/мин</span></div>
        <div id="offlineEarn" style="font-size:9px;color:#00ff88"></div>

        <div class="tabs">
            <button class="tab-btn active" id="tb-case">🎁</button>
            <button class="tab-btn" id="tb-inv">📦</button>
            <button class="tab-btn" id="tb-evo">⭐</button>
            <button class="tab-btn" id="tb-craft">🔨</button>
            <button class="tab-btn" id="tb-auc">🏪</button>
            <button class="tab-btn" id="tb-rate">🏆</button>
            <button class="tab-btn" id="tb-trade">🔄</button>
        </div>

        <div class="tab-content active" id="tab-case">
            <div class="stats"><div>Откр: <b id="opens">0</b></div><div>Гарант: <b id="pity">10</b></div><div>Лучш: <b id="best">-</b></div><div>Карт: <b id="totalItems">0</b></div></div>
            <div style="color:#ff88aa;margin:6px 0">🧠 Кейс: <b>10</b> брейнкоинов</div>
            <button class="case-btn" id="caseButton">🎁</button>
            <div class="result" id="result">Жми!</div>
        </div>
        <div class="tab-content" id="tab-inv"><div class="inv-grid" id="inventory"></div></div>
        <div class="tab-content" id="tab-evo"><h3 style="color:#ffd700;margin:6px 0">⭐ Эволюция</h3><div id="evoList"></div></div>
        <div class="tab-content" id="tab-craft"><div style="background:rgba(255,170,0,0.06);border-radius:14px;padding:12px;margin:6px 0;border:2px solid rgba(255,170,0,0.4)"><h3 style="color:#ffaa00">🔨 Комбо-крафт (10 любых)</h3><div id="craftSlotsContainer" style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;min-height:50px;margin:8px 0;padding:8px;background:rgba(0,0,0,0.3);border-radius:10px;border:2px dashed #555"></div><p style="color:#ffaa00">Выбрано: <b id="craftCount">0</b>/10</p><div id="craftPreview" style="background:rgba(0,0,0,0.3);border-radius:8px;padding:8px;margin:6px 0;min-height:50px;font-size:10px;color:#666">Добавь карты</div><button class="btn" style="background:#ffaa00;color:#000" id="craftButton" disabled>🔨 Скрафтить!</button></div></div>
        <div class="tab-content" id="tab-auc"><h3 style="color:#00ff88;margin:6px 0">🏪 Аукцион</h3><select id="auctionItemSelect" style="width:100%;padding:8px;margin:4px 0;background:#111;border:1px solid #444;color:#fff;border-radius:6px;font-size:12px"><option value="">Выбери</option></select><input type="number" id="auctionPrice" placeholder="Цена" style="width:100%;padding:8px;margin:4px 0;background:#111;border:1px solid #444;color:#fff;border-radius:6px;font-size:12px"><button id="sellBtn" style="background:#00ff88;color:#000;border:none;padding:10px;border-radius:6px;font-size:13px;cursor:pointer;width:100%;font-weight:bold;margin-top:4px">📤 Выставить</button><div id="auctionList" style="margin-top:6px;font-size:10px;color:#888"></div></div>
        <div class="tab-content" id="tab-rate"><h3 style="color:#ff88aa;margin:6px 0">🏆 Топ</h3><div id="ratingList">Загрузка...</div></div>
        <div class="tab-content" id="tab-trade"><div style="background:rgba(255,255,255,0.05);border-radius:10px;padding:10px;margin:6px 0"><input type="number" id="tradeTo" placeholder="TG ID" style="width:100%;padding:8px;margin:4px 0;background:#111;border:1px solid #444;color:#fff;border-radius:6px;font-size:12px"><div id="myTradeSlot" style="border:2px dashed #555;border-radius:6px;padding:10px;margin:4px 0;cursor:pointer;font-size:11px;color:#888;text-align:center">👆 Выбери</div><input type="text" id="tradeTheir" placeholder="ID предмета" style="width:100%;padding:8px;margin:4px 0;background:#111;border:1px solid #444;color:#fff;border-radius:6px;font-size:12px"><div id="myInvForTrade" style="display:none"><div id="tradeInvGrid" style="display:flex;flex-wrap:wrap;gap:4px;max-height:120px;overflow-y:auto;padding:6px;background:rgba(0,0,0,0.2);border-radius:6px;margin:4px 0"></div><button onclick="cancelTrade()" style="background:#444;color:#fff;border:none;padding:4px 8px;border-radius:4px;font-size:10px">Отмена</button></div><button class="btn" id="sendTradeBtn">🚀 Отправить</button></div></div>
    </div>

    <script>
        var SUPABASE_URL = 'https://qcpueprjlfuntfwqiboo.supabase.co';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFjcHVlcHJqbGZ1bnRmd3FpYm9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzNjgyNTksImV4cCI6MjA5OTk0NDI1OX0.UxJbESuV5jenQcVC9cUXX9qz9_NEVd9PrR_4Q-df618';
        var supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        var tg = Telegram.WebApp; tg.ready(); tg.expand();
        var tgId = tg.initDataUnsafe?.user?.id || 12345;
        var pn = tg.initDataUnsafe?.user?.username || tg.initDataUnsafe?.user?.first_name || 'Сигма';
        document.getElementById('username').innerText = '⚡ ' + pn;

        var CASE_COST = 10;
        var baseIncome = {'chrome':1,'common':3,'rare':7,'epic':15,'legendary':40,'mythic':100};
        var rarityColors = {'chrome':'#888','common':'#00ff00','rare':'#0088ff','epic':'#aa00ff','legendary':'#ffaa00','mythic':'#ff0000'};
        var evoStages = ['','Мега','Гига','Ультра','Бог'];
        var evoMultiplier = [1,1.5,2.5,5,10];

        function getUpgradeCost(lvl){if(lvl<=0)return 0;if(lvl<=5)return Math.floor(50*Math.pow(1.5,lvl-1));if(lvl<=10)return Math.floor(200*Math.pow(1.6,lvl-6));if(lvl<=15)return Math.floor(1000*Math.pow(1.7,lvl-11));return Math.floor(5000*Math.pow(1.8,lvl-16));}
        function getEvoClass(evo){if(evo>=4)return'evo-god';if(evo>=3)return'evo-ultra';if(evo>=2)return'evo-giga';if(evo>=1)return'evo-mega';return'';}

        var items = [
            {id:'skibidi',name:'Скибиди',rarity:'chrome',emoji:'🚽',chance:8},{id:'sigma',name:'Сигма',rarity:'chrome',emoji:'🗿',chance:8},{id:'rizz',name:'Ризз',rarity:'chrome',emoji:'😏',chance:7},{id:'ohio',name:'Огайо',rarity:'chrome',emoji:'🌽',chance:7},{id:'fanum',name:'Фанум',rarity:'chrome',emoji:'🍔',chance:6},{id:'kaira',name:'Кай',rarity:'chrome',emoji:'🤷',chance:6},{id:'edge',name:'Эдж',rarity:'chrome',emoji:'😈',chance:6},{id:'meow',name:'Мяу',rarity:'chrome',emoji:'😺',chance:6},{id:'yapp',name:'Яппинг',rarity:'chrome',emoji:'🗣️',chance:6},{id:'gigachad',name:'Гигачад',rarity:'common',emoji:'💪',chance:4},{id:'oguzok',name:'Огузок',rarity:'common',emoji:'🍑',chance:4},{id:'bombastic',name:'Бомбастик',rarity:'common',emoji:'👀',chance:3},{id:'goofy',name:'Гуфи',rarity:'common',emoji:'🤪',chance:3},{id:'glazer',name:'Глейзер',rarity:'common',emoji:'😍',chance:3},{id:'blud',name:'Блуд',rarity:'common',emoji:'💀',chance:3},{id:'nocap',name:'Ноу-кэп',rarity:'common',emoji:'🧢',chance:3},{id:'womp',name:'Вомп',rarity:'common',emoji:'🎺',chance:2},{id:'mamkin',name:'Мамкин',rarity:'rare',emoji:'⚔️',chance:1.5},{id:'quad',name:'Квадро',rarity:'rare',emoji:'🦘',chance:1.5},{id:'zawarudo',name:'За Вардо',rarity:'rare',emoji:'⏱️',chance:1.5},{id:'ded',name:'Дед',rarity:'rare',emoji:'🖤',chance:1.5},{id:'kringe',name:'Кринж',rarity:'rare',emoji:'🫣',chance:1.5},{id:'pov',name:'ПОВ',rarity:'rare',emoji:'📹',chance:1.5},{id:'based',name:'Бейзд',rarity:'rare',emoji:'🗿',chance:1},{id:'cybercat',name:'Кибер-Кот',rarity:'epic',emoji:'🐱',chance:0.7},{id:'npc',name:'NPC',rarity:'epic',emoji:'🤖',chance:0.7},{id:'grimace',name:'Гримейс',rarity:'epic',emoji:'🥤',chance:0.6},{id:'mewing',name:'Мьюинг',rarity:'epic',emoji:'🗿',chance:0.6},{id:'looksmax',name:'Луксмакс',rarity:'epic',emoji:'💅',chance:0.6},{id:'doom',name:'Думскролл',rarity:'epic',emoji:'📱',chance:0.4},{id:'tiktok',name:'ТикТок',rarity:'epic',emoji:'🎬',chance:0.3},{id:'minecraft',name:'Майнкрафт',rarity:'legendary',emoji:'⛏️',chance:0.2},{id:'altushka',name:'Альтушка',rarity:'legendary',emoji:'👩‍💻',chance:0.2},{id:'drip',name:'Дрип',rarity:'legendary',emoji:'🥶',chance:0.2},{id:'sigmam',name:'Сигма-мейл',rarity:'legendary',emoji:'🐺',chance:0.15},{id:'lobster',name:'Лобстер',rarity:'legendary',emoji:'🦞',chance:0.15},{id:'alpha',name:'Альфа',rarity:'legendary',emoji:'👑',chance:0.1},{id:'shaman',name:'Шаман',rarity:'mythic',emoji:'👽',chance:0.03},{id:'hyper',name:'Гипер',rarity:'mythic',emoji:'❄️',chance:0.03},{id:'brotgod',name:'Бог',rarity:'mythic',emoji:'🧠',chance:0.02},{id:'cringe',name:'Властелин',rarity:'mythic',emoji:'😬',chance:0.02}
        ];

        var totalOpens=0,pity=0,bestRarity='none',coins=100,allInv=[],tradeMyItem=null,craftSlots=[];

        document.getElementById('caseButton').addEventListener('click',openCase);
        ['case','inv','evo','craft','auc','rate','trade'].forEach(function(t){document.getElementById('tb-'+t).addEventListener('click',function(){switchTab(t)});});
        document.getElementById('craftButton').addEventListener('click',doCraft);
        document.getElementById('sellBtn').addEventListener('click',sellItem);
        document.getElementById('sendTradeBtn').addEventListener('click',sendTrade);
        document.getElementById('myTradeSlot').addEventListener('click',showMyInv);

        function init(){
            supabase.from('players').select('*').eq('tg_id',tgId).single().then(function(res){
                var p=res.data,now=new Date();
                if(!p){supabase.from('players').insert({tg_id:tgId,username:pn,coins:100,last_seen:now.toISOString()}).then(function(){});p={total_opens:0,pity_counter:0,best_rarity:'none',coins:100};}
                totalOpens=p.total_opens||0;pity=p.pity_counter||0;bestRarity=p.best_rarity||'none';coins=p.coins||100;
                var mins=Math.floor((now-new Date(p.last_seen||now))/60000);
                supabase.from('inventory').select('*').eq('player_tg_id',tgId).then(function(invRes){
                    allInv=invRes.data||[];var ipm=0;for(var i=0;i<allInv.length;i++) ipm+=getItemIncome(allInv[i]);
                    if(mins>0&&ipm>0){coins+=mins*ipm;document.getElementById('offlineEarn').innerText='💤 +'+mins*ipm+' брейнкоинов';setTimeout(function(){document.getElementById('offlineEarn').innerText=''},10000);}
                    supabase.from('players').upsert({tg_id:tgId,coins:coins,last_seen:now.toISOString()}).then(function(){});
                    updateUI();renderInventory();loadAuction();
                });
            }).catch(function(){updateUI();});
            setInterval(function(){var ipm=0;for(var i=0;i<allInv.length;i++) ipm+=getItemIncome(allInv[i]);if(ipm>0){coins+=ipm;supabase.from('players').upsert({tg_id:tgId,coins:coins,last_seen:new Date().toISOString()}).then(function(){});updateUI();}},60000);
        }

        function getItemIncome(item){return Math.floor((baseIncome[item.rarity]||1)*evoMultiplier[item.evolution||0]*(1+(item.upgrade_level||0)*0.5));}

        function updateUI(){
            document.getElementById('opens').innerText=totalOpens;
            document.getElementById('pity').innerText=Math.max(0,10-pity);
            var bm={'none':'-','chrome':'🚽','common':'💚','rare':'💙','epic':'💜','legendary':'🧡','mythic':'❤️'};
            document.getElementById('best').innerText=bm[bestRarity]||'-';
            document.getElementById('coins').innerText=coins;
            var ti=0;for(var i=0;i<allInv.length;i++) ti+=getItemIncome(allInv[i]);
            document.getElementById('incomePerMin').innerText=ti;
            document.getElementById('caseButton').classList.toggle('disabled',coins<CASE_COST);
        }

        function renderInventory(){
            allInv.sort(function(a,b){var o={'mythic':0,'legendary':1,'epic':2,'rare':3,'common':4,'chrome':5};return (o[a.rarity]||99)-(o[b.rarity]||99)});
            var html='',count=0,stacked={},unique=[];
            for(var i=0;i<allInv.length;i++){
                var item=allInv[i];
                // Стакаем только базовые: lvl=0, evo=0, не shiny
                if(item.evolution===0&&item.upgrade_level===0&&!item.is_shiny){
                    if(!stacked[item.item_id])stacked[item.item_id]={count:0,emoji:item.emoji,name:item.item_name,rarity:item.rarity};
                    stacked[item.item_id].count++;
                }else unique.push(item);
            }
            var keys=Object.keys(stacked);
            for(var k=0;k<keys.length;k++){var s=stacked[keys[k]];count+=s.count;
                html+='<div class="inv-item rarity-'+s.rarity+'" onclick="addToCraft(\''+keys[k]+'\')"><span class="inv-emoji">'+s.emoji+'</span><span class="inv-name" style="color:'+(rarityColors[s.rarity]||'#fff')+'">'+s.name+'</span><div class="inv-count-badge">'+s.count+'</div>'+(s.count>=10?'<button class="inv-evo-btn" onclick="event.stopPropagation();quickEvo(\''+keys[k]+'\')">⭐</button>':'')+'</div>';
            }
            for(var u=0;u<unique.length;u++){var i=unique[u];count++;
                var evoName=i.evolution>0?evoStages[i.evolution]+' ':'';
                html+='<div class="inv-item rarity-'+i.rarity+' '+(i.is_shiny?'shiny':'')+' '+getEvoClass(i.evolution)+'" onclick="showModal('+i.id+')"><span class="inv-emoji">'+i.emoji+'</span><span class="inv-name" style="color:'+(rarityColors[i.rarity]||'#fff')+'">'+evoName+i.item_name+'</span><span style="font-size:7px;color:#ffd700">'+(i.is_shiny?'✨ ':'')+'Ур.'+(i.upgrade_level||0)+'</span></div>';
            }
            document.getElementById('inventory').innerHTML=html||'<p style="color:#888;padding:20px">Пусто</p>';
            document.getElementById('totalItems').innerText=count;
            updateUI();
        }

        function showModal(invId){
            var item=allInv.find(function(i){return i.id===invId});if(!item)return;
            var lvl=item.upgrade_level||0,evo=item.evolution||0;
            var rc=rarityColors[item.rarity]||'#fff';
            var maxLvl=lvl>=20;
            var cost=maxLvl?0:getUpgradeCost(lvl+1);
            var inc=getItemIncome(item);
            var nextInc=maxLvl?inc:Math.floor((baseIncome[item.rarity]||1)*evoMultiplier[evo]*(1+(lvl+1)*0.5));
            
            var overlay=document.createElement('div');overlay.className='modal-overlay';
            overlay.id='modal-'+invId;
            overlay.innerHTML='<div class="modal-card" style="border:4px solid '+rc+';box-shadow:0 0 30px '+rc+'"><button class="modal-close">✕</button><span class="modal-emoji">'+item.emoji+'</span><div style="font-size:20px;font-weight:bold;color:'+rc+'">'+(evo>0?evoStages[evo]+'-':'')+item.item_name+(item.is_shiny?' ✨':'')+'</div><div style="font-size:13px;text-transform:uppercase;color:'+rc+'">'+item.rarity+'</div><div style="color:#ffd700;margin:4px 0">⭐ Эволюция: '+evo+' | Уровень: '+lvl+'/20</div><div style="color:#ffaa00">🧠 Доход: +'+inc+' брейнкоинов/мин</div>'+
            (maxLvl?'<div class="modal-upgrade-max">🌟 МАКСИМАЛЬНЫЙ УРОВЕНЬ!</div>':
            '<div style="color:#ffaa00;margin:6px 0">💰 Прокачка до ур.'+(lvl+1)+': <b>'+cost+'</b> брейнкоинов → станет +'+nextInc+'/мин</div><button class="modal-upgrade-btn" '+(coins<cost?'disabled':'')+' id="modalUpgBtn">'+(coins<cost?'Недостаточно (нужно '+cost+')':'⬆ Прокачать до уровня '+(lvl+1))+'</button>')+
            '</div>';
            document.body.appendChild(overlay);
            
            overlay.querySelector('.modal-close').addEventListener('click',function(){overlay.remove()});
            overlay.addEventListener('click',function(e){if(e.target===overlay)overlay.remove()});
            
            var upgBtn=overlay.querySelector('#modalUpgBtn');
            if(upgBtn){
                upgBtn.addEventListener('click',function(e){
                    e.stopPropagation();
                    if(coins>=cost){
                        coins-=cost;
                        supabase.from('inventory').update({upgrade_level:lvl+1}).eq('id',invId).then(function(){
                            supabase.from('players').upsert({tg_id:tgId,coins:coins,last_seen:new Date().toISOString()}).then(function(){});
                            loadAllInv();renderInventory();
                            // Обновляем модальное окно, не закрывая
                            overlay.remove();
                            showModal(invId);
                        });
                    }
                });
            }
        }

        function quickEvo(itemId){
            var same=allInv.filter(function(i){return i.item_id===itemId&&i.evolution===0&&i.upgrade_level===0&&!i.is_shiny});
            if(same.length<10){alert('Нужно 10 одинаковых! У тебя '+same.length);return;}
            var ids=same.slice(0,10).map(function(i){return i.id});
            Promise.all(ids.map(function(id){return supabase.from('inventory').delete().eq('id',id)})).then(function(){
                supabase.from('inventory').insert({player_tg_id:tgId,item_id:itemId,item_name:same[0].item_name,rarity:same[0].rarity,emoji:same[0].emoji,evolution:1,upgrade_level:0,is_shiny:false}).then(function(){loadAllInv();renderInventory();});
            });
        }

        function loadEvoList(){
            var grouped={};
            for(var i=0;i<allInv.length;i++){var item=allInv[i];if(!grouped[item.item_id])grouped[item.item_id]={counts:{},emoji:item.emoji,name:item.item_name,rarity:item.rarity};grouped[item.item_id].counts[item.evolution||0]=(grouped[item.item_id].counts[item.evolution||0]||0)+1;}
            var html='',keys=Object.keys(grouped);
            for(var k=0;k<keys.length;k++){var g=grouped[keys[k]];
                for(var e=0;e<4;e++){if((g.counts[e]||0)>=10){
                    html+='<div style="background:rgba(255,215,0,0.05);border-radius:10px;padding:10px;margin:4px 0;border:2px solid '+(rarityColors[g.rarity]||'#888')+'"><span style="font-size:30px">'+g.emoji+'</span> <b style="color:'+(rarityColors[g.rarity]||'#fff')+'">'+g.name+'</b><br>10 '+evoStages[e]+' → '+evoStages[e+1]+'<br><button class="btn" style="background:linear-gradient(45deg,#ffd700,#ff6600);color:#000" onclick="doEvo(\''+keys[k]+'\','+(e+1)+')">⭐ Эволюция!</button></div>';
                }}
            }
            document.getElementById('evoList').innerHTML=html||'<p style="color:#888">Нет доступных эволюций.</p>';
        }

        function doEvo(itemId,targetEvo){var from=targetEvo-1;var same=allInv.filter(function(i){return i.item_id===itemId&&i.evolution===from&&!i.is_shiny});if(same.length<10)return;var ids=same.slice(0,10).map(function(i){return i.id});Promise.all(ids.map(function(id){return supabase.from('inventory').delete().eq('id',id)})).then(function(){supabase.from('inventory').insert({player_tg_id:tgId,item_id:itemId,item_name:same[0].item_name,rarity:same[0].rarity,emoji:same[0].emoji,evolution:targetEvo,upgrade_level:0,is_shiny:false}).then(function(){loadAllInv();renderInventory();loadEvoList();});});}

        function addToCraft(itemId){
            if(craftSlots.length>=10){alert('Максимум 10!');return;}
            var found=null;
            for(var i=0;i<allInv.length;i++){if(allInv[i].item_id===itemId&&allInv[i].evolution===0&&allInv[i].upgrade_level===0&&!allInv[i].is_shiny&&!craftSlots.find(function(x){return x.invId===allInv[i].id})){found=allInv[i];break;}}
            if(!found){alert('Нет доступных!');return;}
            craftSlots.push({invId:found.id,item_id:found.item_id,emoji:found.emoji,name:found.item_name,rarity:found.rarity});
            renderCraftSlots();updateCraftPreview();renderInventory();
        }
        function renderCraftSlots(){
            var c=document.getElementById('craftSlotsContainer'),html='';
            for(var i=0;i<craftSlots.length;i++) html+='<div style="width:42px;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;background:rgba(255,170,0,0.15);border:2px solid #ffaa00;position:relative"><span>'+craftSlots[i].emoji+'</span><div onclick="event.stopPropagation();removeFromCraft('+i+')" style="position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:#f44;color:#fff;font-size:10px;line-height:18px;cursor:pointer">✕</div></div>';
            for(var j=craftSlots.length;j<10;j++) html+='<div style="width:42px;height:42px;border-radius:8px;border:2px dashed #555;display:flex;align-items:center;justify-content:center;font-size:18px;color:#555">?</div>';
            c.innerHTML=html||'<p style="color:#555;font-size:10px">Нажимай на карты в инвентаре</p>';
            document.getElementById('craftCount').innerText=craftSlots.length;
            document.getElementById('craftButton').disabled=craftSlots.length<10;
        }
        function removeFromCraft(i){craftSlots.splice(i,1);renderCraftSlots();updateCraftPreview();renderInventory();}
        function updateCraftPreview(){
            if(craftSlots.length===0){document.getElementById('craftPreview').innerHTML='<p style="color:#666">Добавь карты</p>';return;}
            var rc={},ut=[];
            for(var i=0;i<craftSlots.length;i++){rc[craftSlots[i].rarity]=(rc[craftSlots[i].rarity]||0)+1;if(ut.indexOf(craftSlots[i].item_id)===-1)ut.push(craftSlots[i].item_id);}
            var b=ut.length*2+(rc.rare||0)*3+(rc.epic||0)*5+(rc.legendary||0)*8+(rc.mythic||0)*10;
            var html='<b style="color:#ffaa00">Шансы редких+:</b><br>';
            if(Math.min(10,0.5+b*0.3)>0.1)html+='<span style="color:#f00">Мифик: '+Math.min(10,0.5+b*0.3).toFixed(1)+'%</span> ';
            if(Math.min(20,2+b*0.5)>0.1)html+='<span style="color:#fa0">Лега: '+Math.min(20,2+b*0.5).toFixed(1)+'%</span> ';
            if(Math.min(30,8+b*0.7)>0.1)html+='<span style="color:#a0f">Эпик: '+Math.min(30,8+b*0.7).toFixed(1)+'%</span> ';
            document.getElementById('craftPreview').innerHTML=html;
        }
        function doCraft(){
            if(craftSlots.length<10)return;
            var btn=document.getElementById('craftButton');btn.disabled=true;btn.innerText='⏳...';
            var rc={},ut=[];
            for(var i=0;i<craftSlots.length;i++){rc[craftSlots[i].rarity]=(rc[craftSlots[i].rarity]||0)+1;if(ut.indexOf(craftSlots[i].item_id)===-1)ut.push(craftSlots[i].item_id);}
            var b=ut.length*2+(rc.rare||0)*3+(rc.epic||0)*5+(rc.legendary||0)*8+(rc.mythic||0)*10;
            var roll=Math.random()*100,ri;
            if(roll<Math.min(10,0.5+b*0.3))ri=items.filter(function(i){return i.rarity==='mythic'});
            else if(roll<Math.min(10,0.5+b*0.3)+Math.min(20,2+b*0.5))ri=items.filter(function(i){return i.rarity==='legendary'});
            else if(roll<Math.min(10,0.5+b*0.3)+Math.min(20,2+b*0.5)+Math.min(30,8+b*0.7))ri=items.filter(function(i){return i.rarity==='epic'});
            else ri=items.filter(function(i){return i.rarity==='rare'||i.rarity==='common'||i.rarity==='chrome'});
            ri=ri[Math.floor(Math.random()*ri.length)];
            var ids=craftSlots.map(function(x){return x.invId});
            Promise.all(ids.map(function(id){return supabase.from('inventory').delete().eq('id',id)})).then(function(){
                supabase.from('inventory').insert({player_tg_id:tgId,item_id:ri.id,item_name:ri.name,rarity:ri.rarity,emoji:ri.emoji,evolution:0,upgrade_level:0,is_shiny:false}).then(function(){
                    craftSlots=[];renderCraftSlots();updateCraftPreview();loadAllInv();renderInventory();btn.disabled=true;btn.innerText='🔨 Скрафтить!';
                });
            });
        }

        function loadAllInv(){supabase.from('inventory').select('*').eq('player_tg_id',tgId).then(function(res){allInv=res.data||[];});}
        function loadRating(){supabase.from('players').select('tg_id,username,coins').order('coins',{ascending:false}).limit(50).then(function(res){var p=res.data||[],html='<table style="width:100%;border-collapse:collapse;font-size:10px"><tr style="background:rgba(255,100,150,0.2)"><th>#</th><th>Игрок</th><th>🧠</th></tr>';p.forEach(function(r,i){var c='';if(i===0)c='background:rgba(255,215,0,0.15);font-weight:bold';if(r.tg_id===tgId)c+='background:rgba(255,0,255,0.15)!important';html+='<tr style="'+c+'"><td>'+(i+1)+'</td><td>'+(r.username||'ID:'+r.tg_id)+'</td><td>'+r.coins+'</td></tr>';});document.getElementById('ratingList').innerHTML=html+'</table>';});}
        
        function openCase(){
            if(coins<CASE_COST){alert('Мало брейнкоинов!');return;}
            coins-=CASE_COST;
            var item,roll=Math.random()*100,cum=0;
            if(pity>=10){var rp=items.filter(function(i){return['rare','epic','legendary','mythic'].includes(i.rarity)});item=rp[Math.floor(Math.random()*rp.length)];}
            else{for(var i=0;i<items.length;i++){cum+=items[i].chance;if(roll<=cum){item=items[i];break;}}if(!item)item=items[0];}
            totalOpens++;pity=['epic','legendary','mythic','rare'].includes(item.rarity)?0:pity+1;
            if(['chrome','common','rare','epic','legendary','mythic'].indexOf(item.rarity)>['chrome','common','rare','epic','legendary','mythic'].indexOf(bestRarity))bestRarity=item.rarity;
            var isShiny=Math.random()<0.02;
            supabase.from('players').upsert({tg_id:tgId,total_opens:totalOpens,pity_counter:pity,best_rarity:bestRarity,coins:coins,last_seen:new Date().toISOString()}).then(function(){});
            supabase.from('inventory').insert({player_tg_id:tgId,item_id:item.id,item_name:item.name+(isShiny?' ✨':''),rarity:item.rarity,emoji:item.emoji,evolution:0,upgrade_level:0,is_shiny:isShiny}).then(function(){loadAllInv();renderInventory();});
            
            var isRare=['rare','epic','legendary','mythic'].includes(item.rarity);
            if(isRare){
                document.getElementById('result').innerHTML='<div style="font-size:35px">💫</div><p style="color:#ff00ff">Чувствую что-то мощное...</p>';
                document.getElementById('mainContainer').classList.add('shake');
                setTimeout(function(){document.getElementById('mainContainer').classList.remove('shake')},600);
                setTimeout(function(){
                    document.getElementById('result').innerHTML='<span style="font-size:50px">'+item.emoji+(isShiny?'✨':'')+'</span><br><b style="color:'+(rarityColors[item.rarity]||'#fff')+'">'+item.rarity.toUpperCase()+(isShiny?' SHINY':'')+'</b><br>'+item.name;
                    if(item.rarity==='legendary'||item.rarity==='mythic'){document.body.style.background=item.rarity==='mythic'?'#1a0000':'#1a0f00';setTimeout(function(){document.body.style.background='#0a0a0a'},1500);}
                },800);
            }else{
                document.getElementById('result').innerHTML='<span style="font-size:50px">'+item.emoji+(isShiny?'✨':'')+'</span><br><b style="color:'+(rarityColors[item.rarity]||'#fff')+'">'+item.rarity.toUpperCase()+(isShiny?' SHINY':'')+'</b><br>'+item.name;
            }
            updateUI();
        }

        function sellItem(){var id=document.getElementById('auctionItemSelect').value,pr=parseInt(document.getElementById('auctionPrice').value);if(!id||!pr)return;supabase.from('auctions').insert({seller_tg_id:tgId,inventory_id:parseInt(id),price:pr,status:'active'}).then(function(r){if(r.error)alert('Ошибка');else{alert('✅ Выставлено!');loadAllInv();renderInventory();loadAuction();}});}
        function loadAuction(){supabase.from('auctions').select('*').eq('status','active').neq('seller_tg_id',tgId).then(function(res){var a=res.data||[],html='';if(a.length===0)html='<p style="color:#666">Нет лотов</p>';else a.forEach(function(l){supabase.from('inventory').select('*').eq('id',l.inventory_id).single().then(function(inv){var i=inv.data;if(i)html+='<div style="background:rgba(0,255,136,0.05);border-radius:8px;padding:8px;margin:3px 0;border:1px solid rgba(0,255,136,0.3);display:flex;align-items:center;gap:8px;font-size:10px"><span style="font-size:24px">'+i.emoji+'</span><div style="flex:1">'+i.item_name+'<br>🧠<b>'+l.price+'</b></div><button onclick="buyItem('+l.id+','+l.price+')" style="background:#0f0;color:#000;border:none;padding:6px 10px;border-radius:4px;font-weight:bold">Купить</button></div>';document.getElementById('auctionList').innerHTML=html||'<p style="color:#666">Загрузка...</p>';});});});}
        function buyItem(aid,pr){if(coins<pr)return;coins-=pr;supabase.from('auctions').select('*').eq('id',aid).single().then(function(res){var a=res.data;supabase.from('inventory').update({player_tg_id:tgId}).eq('id',a.inventory_id).then(function(){supabase.from('auctions').update({status:'sold'}).eq('id',aid).then(function(){supabase.from('players').select('coins').eq('tg_id',a.seller_tg_id).single().then(function(sr){supabase.from('players').update({coins:(sr.data.coins||0)+pr}).eq('tg_id',a.seller_tg_id).then(function(){});});supabase.from('players').upsert({tg_id:tgId,coins:coins}).then(function(){});alert('✅ Куплено!');updateUI();loadAllInv();renderInventory();loadAuction();});});});}
        function showMyInv(){document.getElementById('myInvForTrade').style.display='block';var html='';allInv.forEach(function(i){html+='<div class="inv-item rarity-'+i.rarity+'" onclick="selectTradeItem(\''+i.item_id+'\',\''+i.item_name+'\',\''+i.emoji+'\')" style="width:55px;padding:3px"><span style="font-size:20px">'+i.emoji+'</span><span style="font-size:6px;color:'+(rarityColors[i.rarity]||'#fff')+'">'+i.item_name+'</span></div>'});document.getElementById('tradeInvGrid').innerHTML=html||'Пусто';}
        function selectTradeItem(id,name,emoji){tradeMyItem=id;document.getElementById('myTradeSlot').innerHTML='✅ '+emoji+' '+name;document.getElementById('myTradeSlot').style.borderColor='#00ff88';document.getElementById('myInvForTrade').style.display='none';}
        function cancelTrade(){tradeMyItem=null;document.getElementById('myTradeSlot').innerHTML='👆 Выбери';document.getElementById('myTradeSlot').style.borderColor='#555';document.getElementById('myInvForTrade').style.display='none';}
        function sendTrade(){var to=parseInt(document.getElementById('tradeTo').value),their=document.getElementById('tradeTheir').value.trim();if(!to||!tradeMyItem||!their)return;supabase.from('trades').insert({from_tg_id:tgId,to_tg_id:to,from_item_id:tradeMyItem,to_item_id:their,status:'pending'}).then(function(r){if(r.error)alert('Ошибка');else{alert('✅ Отправлено!');document.getElementById('tradeTo').value='';document.getElementById('tradeTheir').value='';cancelTrade();}});}
        function loadTrades(){supabase.from('trades').select('*').eq('to_tg_id',tgId).eq('status','pending').then(function(res){var t=res.data||[],html='';if(t.length===0)html='<p style="color:#666">Нет</p>';else t.forEach(function(tr){html+='<div style="background:#111;padding:6px;margin:3px 0;border-radius:6px;font-size:10px">От <b>'+tr.from_tg_id+'</b> 📤'+tr.from_item_id+'→📥'+tr.to_item_id+' <button onclick="acceptTrade('+tr.id+')" style="background:#0f0;color:#000;border:none;padding:4px 8px;border-radius:4px">✓</button></div>'});document.getElementById('tradesList').innerHTML=html;});}
        function acceptTrade(id){supabase.from('trades').update({status:'accepted'}).eq('id',id).then(function(){alert('Принято!');loadTrades()});}
        function updateAuctionSelect(){var sel=document.getElementById('auctionItemSelect');sel.innerHTML='<option value="">Выбери</option>';allInv.forEach(function(i){sel.innerHTML+='<option value="'+i.id+'">'+i.emoji+' '+(i.evolution>0?evoStages[i.evolution]+'-':'')+i.item_name+'</option>'});}

        function switchTab(t){
            document.querySelectorAll('.tab-content').forEach(function(el){el.classList.remove('active')});
            document.querySelectorAll('.tab-btn').forEach(function(el){el.classList.remove('active')});
            document.getElementById('tab-'+t).classList.add('active');document.getElementById('tb-'+t).classList.add('active');
            if(t==='inv')renderInventory();
            if(t==='evo'){loadAllInv();loadEvoList();}
            if(t==='craft'){craftSlots=[];renderCraftSlots();updateCraftPreview();loadAllInv();renderInventory();}
            if(t==='rate')loadRating();
            if(t==='auc'){loadAllInv();updateAuctionSelect();loadAuction();}
            if(t==='trade')loadTrades();
        }

        init();
    </script>
</body>
</html>
