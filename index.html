<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Brainrot Collector</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;color:#fff;font-family:'Courier New',monospace;min-height:100vh;text-align:center;padding:15px}
        h1{background:linear-gradient(45deg,#ff00ff,#00ffff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:22px;margin:10px 0}
        .tabs{display:flex;gap:8px;justify-content:center;margin:15px 0;flex-wrap:wrap}
        .tab-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:10px 15px;border-radius:10px;cursor:pointer;font-family:monospace;font-size:14px}
        .tab-btn.active{background:#ff00ff;border-color:#ff00ff}
        .tab-content{display:none}
        .tab-content.active{display:block}
        .stats{display:flex;justify-content:space-around;background:rgba(255,255,255,0.05);border-radius:15px;padding:15px;margin:10px 0}
        .stat{text-align:center}
        .stat-val{font-size:22px;font-weight:bold;color:#ff00ff}
        .stat-lbl{font-size:10px;color:#888}
        .case-btn{width:130px;height:130px;border-radius:50%;border:3px solid #ff00ff;background:radial-gradient(circle,#1a1a1a,#0a0a0a);color:#fff;font-size:55px;cursor:pointer;box-shadow:0 0 25px rgba(255,0,255,0.4);margin:20px auto;display:block;animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{box-shadow:0 0 25px rgba(255,0,255,0.4)}50%{box-shadow:0 0 50px rgba(255,0,255,0.7)}}
        .case-btn:active{transform:scale(0.9)}
        .result{min-height:80px;padding:15px;background:rgba(0,0,0,0.3);border-radius:15px;margin:10px 0}
        .result-emoji{font-size:60px}
        .result-rarity{font-size:20px;font-weight:bold;text-transform:uppercase;letter-spacing:2px}
        .shake{animation:shake 0.5s ease-in-out}
        @keyframes shake{0%,100%{transform:translate(0,0)}20%{transform:translate(-10px,5px)}40%{transform:translate(10px,-5px)}60%{transform:translate(-5px,5px)}80%{transform:translate(5px,-5px)}}
        .inv-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
        .inv-item{background:rgba(255,255,255,0.05);border-radius:12px;padding:8px;width:75px;border:1px solid #333;font-size:11px}
        .inv-emoji{font-size:28px}
        .trade-box{background:rgba(255,255,255,0.05);border-radius:15px;padding:15px;margin:10px 0}
        .trade-box input{width:100%;padding:10px;margin:5px 0;background:#111;border:1px solid #333;color:#fff;border-radius:10px;font-family:monospace}
        .btn{background:#ff00ff;color:#fff;border:none;padding:12px;border-radius:10px;font-size:16px;cursor:pointer;font-family:monospace;width:100%;margin-top:10px}
        .trade-card{background:rgba(255,255,255,0.05);border-radius:10px;padding:12px;margin:8px 0;border:1px solid #333;font-size:13px;text-align:left}
        .trade-card button{padding:6px 12px;border:none;border-radius:5px;cursor:pointer;font-weight:bold;margin:3px}
        .accept-btn{background:#00ff88;color:#000}
        .reject-btn{background:#ff4444;color:#fff}
    </style>
</head>
<body>
    <h1>🧠 Brainrot Collector</h1>
    <p id="username" style="color:#888;font-size:13px">Загрузка...</p>
    <p style="color:#666;font-size:10px">Твой Telegram ID: <span id="myId"></span></p>

    <div class="tabs">
        <button class="tab-btn active" id="tabBtn-case" onclick="switchTab('case')">🎁 Кейсы</button>
        <button class="tab-btn" id="tabBtn-inv" onclick="switchTab('inv')">📦 Инвентарь</button>
        <button class="tab-btn" id="tabBtn-trade" onclick="switchTab('trade')">🔄 Обмен</button>
    </div>

    <div class="tab-content active" id="tab-case">
        <div class="stats">
            <div class="stat"><div class="stat-val" id="opens">0</div><div class="stat-lbl">Открытий</div></div>
            <div class="stat"><div class="stat-val" id="pity">10</div><div class="stat-lbl">До гаранта</div></div>
            <div class="stat"><div class="stat-val" id="best">-</div><div class="stat-lbl">Лучший</div></div>
        </div>
        <button class="case-btn" onclick="openCase()">🎁</button>
        <p style="color:#888;font-size:13px">Жми на кейс!</p>
        <div class="result" id="result">Тут появится твой дроп</div>
    </div>

    <div class="tab-content" id="tab-inv">
        <h3 style="color:#00ffff;margin:10px 0">📦 Твой инвентарь</h3>
        <div class="inv-grid" id="inventory"></div>
    </div>

    <div class="tab-content" id="tab-trade">
        <h3 style="color:#00ffff;margin:10px 0">🔄 Обмен</h3>
        <div class="trade-box">
            <p style="text-align:left;color:#888;font-size:12px">📤 Предложить обмен:</p>
            <input type="number" id="tradeTo" placeholder="Telegram ID игрока">
            <input type="text" id="tradeMy" placeholder="Твой предмет (ID)">
            <input type="text" id="tradeTheir" placeholder="Хочешь получить (ID)">
            <button class="btn" onclick="sendTrade()">🚀 Отправить</button>
        </div>
        <div id="tradesList">
            <p style="color:#888;font-size:13px">⏳ Входящие предложения:</p>
            <p style="color:#666" id="noTrades">Нет активных трейдов</p>
        </div>
    </div>

    <script>
        // === SUPABASE ===
        const SUPABASE_URL = 'https://qcpueprjlfuntfwqiboo.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFjcHVlcHJqbGZ1bnRmd3FpYm9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzNjgyNTksImV4cCI6MjA5OTk0NDI1OX0.UxJbESuV5jenQcVC9cUXX9qz9_NEVd9PrR_4Q-df618';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // === TELEGRAM ===
        const tg = Telegram.WebApp;
        tg.ready();
        tg.expand();

        const tgId = tg.initDataUnsafe?.user?.id || 12345;
        const playerName = tg.initDataUnsafe?.user?.username || tg.initDataUnsafe?.user?.first_name || 'Сигма';
        document.getElementById('username').innerText = '⚡ ' + playerName;
        document.getElementById('myId').innerText = tgId;

        // === ПРЕДМЕТЫ ===
        const items = [
            {id:'skibidi',name:'Скибиди Туалет',rarity:'chrome',emoji:'🚽',chance:60,color:'#888'},
            {id:'gigachad',name:'Гигачад',rarity:'common',emoji:'💪',chance:25,color:'#0f0'},
            {id:'mamkin',name:'Мамкин Найн',rarity:'rare',emoji:'⚔️',chance:10,color:'#08f'},
            {id:'cybercat',name:'Кибер-Кот',rarity:'epic',emoji:'🐱',chance:3.9,color:'#a0f'},
            {id:'altushka',name:'Альтушка с Госуслуг',rarity:'legendary',emoji:'👩‍💻',chance:1,color:'#fa0'},
            {id:'shaman',name:'Зумер-Шаман',rarity:'mythic',emoji:'👽',chance:0.1,color:'#f00'}
        ];

        let totalOpens = 0, pity = 0, bestRarity = 'none';

        // === ЗАГРУЗКА ===
        async function init() {
            document.getElementById('username').innerText = '⚡ ' + playerName;
            try {
                let { data: p, error } = await supabase.from('players').select('*').eq('tg_id', tgId).single();
                if (error && error.code !== 'PGRST116') { console.log('DB error:', error.message); }
                if (!p) {
                    await supabase.from('players').insert({ tg_id: tgId, username: playerName });
                    p = { total_opens: 0, pity_counter: 0, best_rarity: 'none' };
                }
                totalOpens = p.total_opens || 0;
                pity = p.pity_counter || 0;
                bestRarity = p.best_rarity || 'none';
            } catch(e) {
                console.log('Init error:', e);
            }
            updateUI();
            loadInv();
            loadTrades();
        }

        function updateUI() {
            document.getElementById('opens').innerText = totalOpens;
            document.getElementById('pity').innerText = Math.max(0, 10 - pity);
            const bm = { 'none': '-', 'chrome': '🚽', 'common': '💚', 'rare': '💙', 'epic': '💜', 'legendary': '🧡', 'mythic': '❤️' };
            document.getElementById('best').innerText = bm[bestRarity] || '-';
        }

        // === ОТКРЫТИЕ КЕЙСА ===
        async function openCase() {
            let item;
            if (pity >= 10) {
                const rp = items.filter(i => ['rare','epic','legendary','mythic'].includes(i.rarity));
                item = rp[Math.floor(Math.random() * rp.length)];
            } else {
                let roll = Math.random() * 100, cum = 0;
                for (let i of items) { cum += i.chance; if (roll <= cum) { item = i; break; } }
                if (!item) item = items[0];
            }

            totalOpens++;
            pity = ['epic','legendary','mythic','rare'].includes(item.rarity) ? 0 : pity + 1;
            const ranks = ['chrome','common','rare','epic','legendary','mythic'];
            if (ranks.indexOf(item.rarity) > ranks.indexOf(bestRarity)) bestRarity = item.rarity;

            try {
                await supabase.from('players').upsert({ tg_id: tgId, username: playerName, total_opens: totalOpens, pity_counter: pity, best_rarity: bestRarity });
                let { data: ex } = await supabase.from('inventory').select('*').eq('player_tg_id', tgId).eq('item_id', item.id).single();
                if (ex) await supabase.from('inventory').update({ count: ex.count + 1 }).eq('id', ex.id);
                else await supabase.from('inventory').insert({ player_tg_id: tgId, item_id: item.id, item_name: item.name, rarity: item.rarity, emoji: item.emoji, count: 1 });
            } catch(e) {
                console.log('Save error:', e);
            }

            document.body.classList.add('shake');
            setTimeout(() => document.body.classList.remove('shake'), 500);
            document.getElementById('result').innerHTML = `<span class="result-emoji">${item.emoji}</span><br><span class="result-rarity" style="color:${item.color}">${item.rarity}</span><br>${item.name}`;
            
            if (['legendary','mythic'].includes(item.rarity)) {
                document.body.style.background = item.rarity === 'mythic' ? '#1a0000' : '#1a0f00';
                setTimeout(() => document.body.style.background = '#0a0a0a', 1500);
            }

            updateUI();
            loadInv();
        }

        // === ИНВЕНТАРЬ ===
        async function loadInv() {
            try {
                let { data: inv } = await supabase.from('inventory').select('*').eq('player_tg_id', tgId);
                let html = '';
                if (!inv || inv.length === 0) html = '<p style="color:#888">Пусто. Открой кейс!</p>';
                else {
                    inv.forEach(i => {
                        html += `<div class="inv-item" style="border-color:${i.rarity==='chrome'?'#888':i.rarity==='common'?'#0f0':i.rarity==='rare'?'#08f':i.rarity==='epic'?'#a0f':i.rarity==='legendary'?'#fa0':'#f00'}"><div class="inv-emoji">${i.emoji}</div>${i.item_name}<br><small>x${i.count}</small><br><small style="color:#666">ID:${i.item_id}</small></div>`;
                    });
                }
                document.getElementById('inventory').innerHTML = html;
            } catch(e) { console.log('Inv error:', e); }
        }

        // === ТРЕЙДЫ ===
        async function sendTrade() {
            var to = parseInt(document.getElementById('tradeTo').value);
            var my = document.getElementById('tradeMy').value.trim();
            var their = document.getElementById('tradeTheir').value.trim();
            if (!to || !my || !their) { alert('Заполни все поля'); return; }
            try {
                await supabase.from('trades').insert({ from_tg_id: tgId, to_tg_id: to, from_item_id: my, to_item_id: their, status: 'pending' });
                alert('Предложение отправлено!');
                document.getElementById('tradeTo').value = '';
                document.getElementById('tradeMy').value = '';
                document.getElementById('tradeTheir').value = '';
            } catch(e) { alert('Ошибка: ' + e.message); }
        }

        async function loadTrades() {
            try {
                var { data: trades } = await supabase.from('trades').select('*').eq('to_tg_id', tgId).eq('status', 'pending');
                var html = '<p style="color:#888;font-size:13px">⏳ Входящие предложения:</p>';
                if (!trades || trades.length === 0) html += '<p style="color:#666">Нет активных трейдов</p>';
                else {
                    trades.forEach(function(t) {
                        html += '<div class="trade-card">От <b>' + t.from_tg_id + '</b><br>📤 ' + t.from_item_id + '<br>📥 ' + t.to_item_id + '<br><button class="accept-btn" onclick="acceptTrade(' + t.id + ')">Принять</button><button class="reject-btn" onclick="rejectTrade(' + t.id + ')">Отклонить</button></div>';
                    });
                }
                document.getElementById('tradesList').innerHTML = html;
            } catch(e) { console.log('Trades error:', e); }
        }

        async function acceptTrade(id) {
            try {
                await supabase.from('trades').update({ status: 'accepted' }).eq('id', id);
                alert('Обмен принят!');
                loadTrades();
            } catch(e) { alert('Ошибка'); }
        }

        async function rejectTrade(id) {
            try {
                await supabase.from('trades').update({ status: 'rejected' }).eq('id', id);
                loadTrades();
            } catch(e) { alert('Ошибка'); }
        }

        // === ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ===
        function switchTab(t) {
            var tabs = document.querySelectorAll('.tab-content');
            for (var i = 0; i < tabs.length; i++) { tabs[i].classList.remove('active'); }
            var btns = document.querySelectorAll('.tab-btn');
            for (var j = 0; j < btns.length; j++) { btns[j].classList.remove('active'); }
            var tabEl = document.getElementById('tab-' + t);
            if (tabEl) tabEl.classList.add('active');
            var btnEl = document.getElementById('tabBtn-' + t);
            if (btnEl) btnEl.classList.add('active');
            if (t === 'inv') loadInv();
            if (t === 'trade') loadTrades();
        }

        // === REALTIME ===
        supabase.channel('trades').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'trades', filter: 'to_tg_id=eq.' + tgId }, function() { loadTrades(); }).subscribe();

        // === СТАРТ ===
        init();
    </script>
</body>
</html>
